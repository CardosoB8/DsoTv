<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0F1C2E; color: #fff; min-height: 100vh; }
        .header { background: #1A2D42; padding: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .logo { font-size: 22px; font-weight: bold; color: #E50914; }
        .nav { display: flex; gap: 8px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .nav button.active { background: #E50914; color: #fff; }
        .search { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; }
        .search input { background: none; border: none; color: #fff; outline: none; width: 150px; }
        .categorias { padding: 12px; display: flex; gap: 8px; overflow-x: auto; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .categoria.active { background: #E50914; color: #fff; }
        .grid { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: #1A2D42; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #0a1520; }
        .card .info { padding: 10px; }
        .card .titulo { font-size: 13px; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: #B0BEC5; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { width: 95%; max-width: 800px; background: #0F1C2E; border-radius: 16px; overflow: hidden; }
        .modal-header { padding: 15px; background: #1A2D42; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .video-container { aspect-ratio: 16/9; background: #000; }
        .status { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 8px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> DSO TV</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv"><i class="fas fa-tv"></i> TV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar...">
        </div>
    </div>
    
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="all"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <div class="grid" id="grid"></div>
    <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitulo">Título</span>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="video-container">
                <video id="player" class="video-js vjs-default-skin" controls></video>
            </div>
            <div id="modalInfo" style="padding:15px;color:#B0BEC5;"></div>
        </div>
    </div>
    
    <div class="status" id="status">✅ Pronto</div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script>
        let modo = 'filmes';
        let categoria = 'all';
        let offset = 0;
        let carregando = false;
        let temMais = true;
        let player = null;
        
        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('player');
            
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    modo = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = modo === 'filmes' ? 'flex' : 'none';
                    resetar();
                });
            });
            
            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) {
                    categoria = btn.dataset.cat;
                    document.querySelectorAll('.categoria').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    resetar();
                }
            });
            
            let timeout;
            document.getElementById('busca').addEventListener('input', e => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    if (e.target.value) buscar(e.target.value);
                    else resetar();
                }, 500);
            });
            
            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
                    if (!carregando && temMais && modo === 'filmes') carregar();
                }
            });
            
            document.getElementById('modalClose').addEventListener('click', () => {
                player.pause();
                document.getElementById('modal').classList.remove('active');
            });
            
            document.getElementById('grid').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (card) abrir(card.dataset.id, card.dataset.titulo);
            });
            
            carregarCategorias();
            carregar();
        });
        
        async function carregarCategorias() {
            try {
                const res = await fetch('/api/categorias');
                const data = await res.json();
                
                if (data.categorias) {
                    const container = document.getElementById('categorias');
                    const allBtn = container.querySelector('[data-cat="all"]');
                    container.innerHTML = '';
                    container.appendChild(allBtn.cloneNode(true));
                    
                    data.categorias.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {}
        }
        
        async function carregar() {
            if (carregando || !temMais) return;
            
            carregando = true;
            document.getElementById('loading').style.display = 'block';
            setStatus('Carregando...');
            
            try {
                let url = modo === 'filmes' 
                    ? (categoria === 'all' 
                        ? `/api/filmes?limit=50&offset=${offset}` 
                        : `/api/filmes/categoria/${categoria}?limit=50&offset=${offset}`)
                    : '/api/canais';
                
                const res = await fetch(url);
                const data = await res.json();
                const itens = data.filmes || data.canais || [];
                
                setStatus(`${itens.length} itens`);
                
                if (itens.length) {
                    renderizar(itens, offset === 0);
                    offset += itens.length;
                    if (itens.length < 50) temMais = false;
                } else {
                    temMais = false;
                }
            } catch (e) {
                setStatus('Erro');
            } finally {
                carregando = false;
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        async function buscar(termo) {
            setStatus(`Buscando: ${termo}`);
            document.getElementById('grid').innerHTML = '';
            
            try {
                const res = await fetch(`/api/buscar?q=${encodeURIComponent(termo)}`);
                const data = await res.json();
                if (data.filmes) renderizar(data.filmes, true);
            } catch (e) {}
        }
        
        async function abrir(id, titulo) {
            setStatus(`Abrindo: ${titulo}`);
            
            try {
                const url = modo === 'filmes' ? `/api/filme/${id}` : `/api/canal/${id}`;
                const res = await fetch(url);
                const data = await res.json();
                const item = data.filme || data.canal;
                
                if (item && item.videoUrl) {
                    document.getElementById('modalTitulo').textContent = item.titulo || titulo;
                    document.getElementById('modalInfo').innerHTML = item.descricao || (item.ano ? `Ano: ${item.ano}` : 'AO VIVO');
                    player.src({ src: item.videoUrl, type: item.videoUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4' });
                    document.getElementById('modal').classList.add('active');
                } else {
                    alert('Vídeo não disponível');
                }
            } catch (e) {
                alert('Erro ao abrir');
            }
        }
        
        function renderizar(itens, limpar) {
            const grid = document.getElementById('grid');
            if (limpar) grid.innerHTML = '';
            
            itens.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.dataset.titulo = item.titulo;
                card.innerHTML = `
                    ${item.thumb ? `<img src="${item.thumb}" onerror="this.style.display='none'">` : ''}
                    <div class="info"><div class="titulo">${item.titulo || ''}</div></div>
                `;
                grid.appendChild(card);
            });
        }
        
        function resetar() {
            offset = 0;
            temMais = true;
            document.getElementById('grid').innerHTML = '';
            carregar();
        }
    </script>
</body>
</html>
