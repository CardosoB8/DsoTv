<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="no-referrer">
    <title>DSO TV - FILMES E CANAIS TV GRÁTIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #0F1C2E; color: #FFFFFF; min-height: 100vh; padding-bottom: 40px; }
        .header { background: #1A2D42; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #E50914; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .logo i { font-size: 24px; }
        .nav { display: flex; gap: 6px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 14px; border-radius: 25px; cursor: pointer; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .nav button i { font-size: 15px; }
        .nav button.active { background: #E50914; color: #FFFFFF; }
        .search { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 6px 14px; display: flex; align-items: center; gap: 8px; }
        .search i { color: #B0BEC5; font-size: 14px; }
        .search input { background: none; border: none; color: #FFFFFF; outline: none; font-size: 13px; width: 180px; }
        .search input::placeholder { color: #6c7a8a; }
        .categorias { padding: 10px 14px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 7px 14px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .categoria i { font-size: 12px; }
        .categoria.active { background: #E50914; color: #FFFFFF; }
        .section-title { font-size: 16px; font-weight: bold; margin: 16px 14px 8px; color: #64B5F6; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #E50914; font-size: 16px; }
        .grid { padding: 0 14px 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid.tv-mode { grid-template-columns: 1fr; }
        .grid.tv-mode .card { display: flex; height: 70px; }
        .grid.tv-mode .card .thumb { width: 110px; height: 70px; }
        .card { background: #1A2D42; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 10px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(229,9,20,0.2); }
        .card .thumb { aspect-ratio: 2/3; background: #0a1520; display: flex; align-items: center; justify-content: center; position: relative; }
        .grid.tv-mode .card .thumb { aspect-ratio: auto; }
        .card .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card .thumb .fallback { font-size: 32px; color: #3a5068; }
        .card .thumb .live-badge { position: absolute; top: 5px; left: 5px; background: #E50914; color: #FFF; padding: 3px 6px; border-radius: 3px; font-size: 8px; font-weight: bold; }
        .card .info { padding: 10px; }
        .grid.tv-mode .card .info { display: flex; flex-direction: column; justify-content: center; }
        .card .titulo { font-size: 12px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .card .meta { font-size: 10px; color: #64B5F6; display: flex; align-items: center; gap: 4px; }
        .loading { text-align: center; padding: 30px; color: #B0BEC5; }
        .loading i { font-size: 32px; color: #E50914; animation: spin 1s linear infinite; margin-bottom: 8px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .detalhes-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F1C2E; z-index: 1000; overflow-y: auto; display: none; }
        .detalhes-page.active { display: block; }
        .detalhes-header { position: relative; }
        .detalhes-back { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border: none; color: #FFF; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .detalhes-capa { width: 100%; height: 220px; object-fit: cover; }
        .detalhes-capa-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: linear-gradient(transparent, #0F1C2E); }
        .detalhes-content { padding: 16px; margin-top: -40px; position: relative; }
        .detalhes-titulo { font-size: 22px; font-weight: bold; margin-bottom: 3px; }
        .detalhes-titulo-original { font-size: 13px; color: #B0BEC5; margin-bottom: 12px; }
        .detalhes-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; color: #B0BEC5; font-size: 13px; }
        .detalhes-meta span { display: flex; align-items: center; gap: 5px; }
        .detalhes-meta i { color: #E50914; }
        .detalhes-botoes { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-primary { background: #E50914; color: #FFF; border: none; padding: 12px 24px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #FFF; border: none; padding: 12px 20px; border-radius: 25px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .detalhes-sinopse { margin-bottom: 20px; }
        .detalhes-sinopse h3 { font-size: 15px; margin-bottom: 8px; color: #64B5F6; }
        .detalhes-sinopse p { color: #B0BEC5; line-height: 1.5; font-size: 13px; }
        .detalhes-elenco { margin-bottom: 20px; }
        .detalhes-elenco h3 { font-size: 15px; margin-bottom: 8px; color: #64B5F6; }
        .elenco-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .elenco-tag { background: #1A2D42; padding: 6px 12px; border-radius: 16px; color: #FFF; font-size: 12px; }
        .detalhes-categorias { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .categoria-tag { background: rgba(100,181,246,0.15); color: #64B5F6; padding: 5px 12px; border-radius: 16px; font-size: 11px; }
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .player-modal.active { display: flex; flex-direction: column; }
        .player-header { padding: 10px 14px; background: #1A2D42; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .player-header h3 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; color: #FFF; }
        .player-close { background: none; border: none; color: #FFFFFF; font-size: 22px; cursor: pointer; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .player-container .video-js { width: 100%; height: 100%; }
        .ad-container { display: flex; justify-content: center; padding: 6px; margin: 10px 0; }
        .ad-placeholder { background: linear-gradient(135deg, #1A2D42, #2A3D52); border: 1px dashed #64B5F6; border-radius: 8px; padding: 10px; text-align: center; color: #B0BEC5; font-size: 11px; width: 100%; }
        .ad-banner { background: linear-gradient(135deg, #2A3D52, #1A2D42); border: 1px solid #64B5F6; border-radius: 12px; padding: 15px; margin: 10px 0; text-align: center; color: #FFF; }
        .ad-banner i { color: #E50914; margin-right: 8px; }
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 6px 16px; font-size: 11px; color: #B0BEC5; display: flex; justify-content: space-between; z-index: 99; }
        .exit-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .exit-popup.active { display: flex; }
        .exit-popup-content { background: #1A2D42; border-radius: 16px; padding: 24px; max-width: 350px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #E50914; }
        .exit-popup-content h3 { color: #E50914; margin-bottom: 16px; font-size: 20px; }
        .exit-popup-content p { color: #B0BEC5; margin-bottom: 24px; font-size: 14px; }
        .exit-popup-buttons { display: flex; gap: 12px; justify-content: center; }
        .exit-btn { padding: 10px 24px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; transition: all 0.2s; }
        .exit-btn-yes { background: #E50914; color: #FFF; }
        .exit-btn-no { background: rgba(255,255,255,0.1); color: #FFF; }
        .exit-btn:hover { transform: scale(1.05); }
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(5, 1fr); } 
            .grid.tv-mode { grid-template-columns: repeat(3, 1fr); } 
            .detalhes-capa { height: 280px; }
            .detalhes-content { max-width: 800px; margin: -40px auto 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="location.reload()"><i class="fas fa-play-circle"></i> DSO TV - FILMES E CANAIS TV GRÁTIS</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv-movtv"><i class="fas fa-tv"></i> TV DSO</button>
            <button data-mode="tv-iptv"><i class="fas fa-satellite"></i> TV ARSADM</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar...">
        </div>
    </div>
    
    <!-- Container para anúncio topo -->
    <div id="adTopContainer" class="ad-container"></div>
    
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <div id="contentContainer"></div>
    <div class="loading" id="loading"><i class="fas fa-spinner"></i><br>Carregando...</div>
    
    <div class="detalhes-page" id="detalhesPage">
        <div class="detalhes-header">
            <button class="detalhes-back" id="detalhesBack"><i class="fas fa-arrow-left"></i></button>
            <img class="detalhes-capa" id="detalhesCapa" src="" alt="">
            <div class="detalhes-capa-overlay"></div>
        </div>
        <div class="detalhes-content">
            <h1 class="detalhes-titulo" id="detalhesTitulo"></h1>
            <div class="detalhes-titulo-original" id="detalhesTituloOriginal"></div>
            <div class="detalhes-meta" id="detalhesMeta"></div>
            <div class="detalhes-botoes">
                <button class="btn-primary" id="btnAbrirNovaAba"><i class="fas fa-external-link-alt"></i> Abrir em Nova Aba</button>
                <button class="btn-secondary" id="btnAssistirRedirect"><i class="fas fa-play"></i> Assistir via Redirect</button>
            </div>
            <div class="detalhes-sinopse">
                <h3><i class="fas fa-align-left"></i> Sinopse</h3>
                <p id="detalhesSinopse"></p>            
            </div>
            <div class="detalhes-elenco">
                <h3><i class="fas fa-users"></i> Elenco</h3>
                <div class="elenco-grid" id="detalhesElenco"></div>
            </div>
            <div class="detalhes-categorias" id="detalhesCategorias"></div>
            <!-- Container para anúncio nos detalhes -->
            <div id="adDetalhesContainer" class="ad-container"></div>
        </div>
    </div>
    
    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <h3 id="playerTitle">Reproduzindo</h3>
            <button class="player-close" id="playerClose">&times;</button>
        </div>
        <div class="player-container" id="playerContainer"></div>
    </div>
    
    <div class="exit-popup" id="exitPopup">
        <div class="exit-popup-content">
            <h3><i class="fas fa-sign-out-alt"></i> Sair do DSO TV?</h3>
            <p>Tem certeza que deseja sair? Volte sempre!</p>
            <div class="exit-popup-buttons">
                <button class="exit-btn exit-btn-yes" id="exitYes">Sim, Sair</button>
                <button class="exit-btn exit-btn-no" id="exitNo">Não, Ficar</button>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="statusMsg">Pronto</span>
        <span><i class="fas fa-wifi"></i> DSO TV</span>
    </div>

    <!-- Scripts carregados no final do body -->
    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    
    <!-- Script de configuração de anúncios carregado dinamicamente -->
    <script>
        // Configuração global de anúncios
        window.adConfig = {
            key: 'f3f5f151f258fa81f6c3b7b9ef4ba434',
            format: 'iframe',
            height: 50,
            width: 320,
            params: {}
        };
        
        // Função para carregar anúncio em container específico
        function loadAd(containerId, adKey = null) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const useKey = adKey || window.adConfig.key;
            container.innerHTML = `
                <iframe src="https://eminentpercentvandalism.com/${useKey}/invoke.js" 
                        style="width: ${window.adConfig.width}px; height: ${window.adConfig.height}px; border: none;"
                        scrolling="no"
                        frameborder="0"></iframe>
            `;
        }
        
        // Carregar anúncios após página carregar
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadAd('adTopContainer');
                loadAd('adDetalhesContainer');
            }, 1000);
        });
    </script>
    
    <script>
        const API_BASE = '/api';
        let currentMode = 'filmes';
        let currentCategory = '0';
        let offset = 0;
        let isLoading = false;
        let hasMore = true;
        let searchTimeout = null;
        let filmeAtual = null;
        let videoPlayer = null;
        let exitIntentEnabled = true;

        function setStatus(text) { document.getElementById('statusMsg').textContent = text; }

        const categoriaIcones = {
            'esportes': 'fa-futbol', 'noticias': 'fa-newspaper', 'documentario': 'fa-book',
            'infantil': 'fa-child', 'filmes-series': 'fa-film', 'variedades': 'fa-star'
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentMode = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = currentMode === 'filmes' ? 'flex' : 'none';
                    resetAndLoad();
                });
            });

            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) { 
                    currentCategory = btn.dataset.cat; 
                    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    resetAndLoad(); 
                }
            });

            const searchInput = document.getElementById('busca');
            searchInput.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = e.target.value.trim();
                    if (term) performSearch(term); else if (currentMode === 'filmes') resetAndLoad();
                }, 500);
            });

            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                    if (!isLoading && hasMore && currentMode === 'filmes' && !searchInput.value) loadMore();
                }
            });

            document.addEventListener('mouseleave', (e) => {
                if (e.clientY <= 0 && exitIntentEnabled) {
                    showExitPopup();
                }
            });

            let backPressTimer = 0;
            window.addEventListener('beforeunload', (e) => {
                if (exitIntentEnabled) {
                    e.preventDefault();
                    e.returnValue = '';
                    showExitPopup();
                    return '';
                }
            });

            document.getElementById('exitYes').addEventListener('click', () => {
                exitIntentEnabled = false;
                window.close();
                window.location.href = 'about:blank';
            });

            document.getElementById('exitNo').addEventListener('click', () => {
                document.getElementById('exitPopup').classList.remove('active');
            });

            document.getElementById('exitPopup').addEventListener('click', (e) => {
                if (e.target.classList.contains('exit-popup')) {
                    document.getElementById('exitPopup').classList.remove('active');
                }
            });

            document.getElementById('detalhesBack').addEventListener('click', () => {
                document.getElementById('detalhesPage').classList.remove('active');
            });

            document.getElementById('btnAbrirNovaAba').addEventListener('click', () => {
                if (filmeAtual && filmeAtual.videoUrl) {
                    window.open(filmeAtual.videoUrl, '_blank');
                    setStatus(`Abrindo em nova aba: ${filmeAtual.titulo}`);
                }
            });

            document.getElementById('btnAssistirRedirect').addEventListener('click', () => {
                if (filmeAtual && filmeAtual.videoUrl) {
                    const redirectUrl = `${API_BASE}/redirect?url=${encodeURIComponent(filmeAtual.videoUrl)}`;
                    window.open(redirectUrl, '_blank');
                    setStatus(`Redirecionando: ${filmeAtual.titulo}`);
                }
            });

            document.getElementById('playerClose').addEventListener('click', closePlayer);
            document.getElementById('playerModal').addEventListener('click', e => {
                if (e.target.classList.contains('player-modal')) closePlayer();
            });

            document.getElementById('contentContainer').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (!card) return;
                
                const id = card.dataset.id;
                const title = card.dataset.title;
                const url = card.dataset.url;
                const type = card.dataset.type;
                
                if (type === 'filme') {
                    openDetalhes(id);
                } else if (type === 'tv-movtv') {
                    fetchTVMOVTVUrl(id, title);
                } else if (type === 'tv-iptv') {
                    if (url) playIPTV(url, title);
                }
            });

            loadCategories();
            loadContent();
        });

        function showExitPopup() {
            document.getElementById('exitPopup').classList.add('active');
        }

        function closePlayer() {
            if (videoPlayer) { 
                videoPlayer.dispose(); 
                videoPlayer = null; 
            }
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('playerContainer').innerHTML = '';
        }

        function playIPTV(url, title) {
            closePlayer();
            document.getElementById('playerTitle').textContent = title || 'Reproduzindo';
            document.getElementById('playerModal').classList.add('active');
            
            const container = document.getElementById('playerContainer');
            const videoElement = document.createElement('video');
            videoElement.className = 'video-js vjs-default-skin vjs-big-play-centered';
            container.appendChild(videoElement);
            
            videoPlayer = videojs(videoElement, { 
                controls: true, 
                autoplay: true, 
                preload: 'auto', 
                fluid: true,
                html5: { 
                    hls: { overrideNative: true },
                    nativeVideoTracks: false,
                    nativeAudioTracks: false,
                    nativeTextTracks: false
                }
            });
            
            videoPlayer.ready(() => { 
                videoPlayer.src({ 
                    src: url, 
                    type: url.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4' 
                }); 
                videoPlayer.play().catch(e => {}); 
            });
            
            videoPlayer.on('error', () => setStatus('Erro - tente novamente'));
            setStatus('Reproduzindo: ' + title);
        }

        async function fetchTVMOVTVUrl(id, title) {
            setStatus(`Carregando ${title}...`);
            try {
                const res = await fetch(`${API_BASE}/canal-movtv/${id}`);
                const data = await res.json();
                const canal = data.canal;
                if (canal && canal.videoUrl) {
                    const redirectUrl = `${API_BASE}/redirect?url=${encodeURIComponent(canal.videoUrl)}`;
                    window.open(redirectUrl, '_blank');
                    setStatus(`Abrindo ${title}`);
                } else { alert('Canal indisponivel'); }
            } catch (e) { alert('Erro ao carregar'); }
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const data = await res.json();
                if (data.categorias && data.categorias.length) {
                    const container = document.getElementById('categorias');
                    container.innerHTML = '<button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>';
                    data.categorias.slice(0, 25).forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria'; btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {}
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true; offset = 0; hasMore = true;
            const container = document.getElementById('contentContainer');
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'block'; container.innerHTML = ''; setStatus('Carregando...');
            try {
                if (currentMode === 'filmes') await loadFilmes();
                else if (currentMode === 'tv-movtv') await loadTVMOVTV();
                else if (currentMode === 'tv-iptv') await loadTVIPTV();
            } catch (e) { setStatus('Erro ao carregar'); }
            finally { isLoading = false; loadingEl.style.display = 'none'; }
        }

        async function loadFilmes() {
            const container = document.getElementById('contentContainer');
            const url = `${API_BASE}/filmes?limit=50&offset=0&category=${currentCategory}`;
            const res = await fetch(url); const data = await res.json(); const items = data.filmes || [];
            let html = '<div class="section-title"><i class="fas fa-film"></i> Filmes</div><div class="grid">';
            items.forEach(item => { html += createCard(item, 'filme'); });
            html += '</div>';
            container.innerHTML = html;
            offset = items.length; hasMore = items.length === 50;
            setStatus(`${items.length} filmes`);
        }

        async function loadTVMOVTV() {
            const container = document.getElementById('contentContainer');
            const url = `${API_BASE}/canais-movtv`;
            const res = await fetch(url);
            const data = await res.json();
            const items = data.canais || [];
            
            let html = '<div class="section-title"><i class="fas fa-tv"></i> Canais DSO TV</div><div class="grid tv-mode">';
            items.forEach(item => { html += createCard(item, 'tv-movtv'); });
            html += '</div>';
            container.innerHTML = html;
            setStatus(`${items.length} canais`);
        }

        async function loadTVIPTV() {
            const container = document.getElementById('contentContainer');
            const url = `${API_BASE}/canais-iptv`; const res = await fetch(url); const data = await res.json(); const items = data.canais || [];
            const categorias = {};
            items.forEach(item => { const cat = item.categoria || 'variedades'; if (!categorias[cat]) categorias[cat] = []; categorias[cat].push(item); });
            let html = '';
            const nomes = { 'esportes': 'Esportes', 'noticias': 'Noticias', 'documentario': 'Documentarios', 'infantil': 'Infantil', 'filmes-series': 'Filmes e Series', 'variedades': 'Variedades' };
            
            let first = true;
            for (const [cat, canais] of Object.entries(categorias)) {
                const icone = categoriaIcones[cat] || 'fa-tv';
                html += `<div class="section-title"><i class="fas ${icone}"></i> ${nomes[cat] || cat}</div><div class="grid tv-mode">`;
                canais.forEach(item => { html += createCard(item, 'tv-iptv', cat); });
                html += '</div>';
                first = false;
            }
            container.innerHTML = html;
            setStatus(`${items.length} canais`);
        }

        function getLocalImagePath(title) {
            if (!title) return '';
            
            const imageMap = {
                'ST_KUNGFU': 'ST_KUNGFU.jpg',
                'ST_Sport_Premium': 'ST_Sport_Premium.jpg',
                'TVM1': 'TVM1.jpg',
                'TDC_series': 'TDC_series.jpg',
                'ST_MOVIES_PLUS': 'ST_MOVIES_PLUS.jpg',
                'MINDCAST_TV': 'MINDCAST_TV.jpg',
                'CGTN': 'CGTN.jpg',
                'ST_NOVELA_P': 'ST_NOVELA_P.jpg',
                'TVI_INTL1': 'TVI_INTL1.jpg',
                'Zee_One': 'Zee_One.jpg',
                'TOONAMI': 'TOONAMI.jpg',
                'REINO_INFANTIL_TV': 'REINO_INFANTIL_TV.jpg',
                'HAQ_TV': 'HAQ_TV.jpg',
                'COLORS': 'COLORS.jpg',
                'NIGEZIE': 'NIGEZIE.jpg',
                'TV_Sucesso': 'TV_Sucesso.jpg',
                'ECO_TV_MOZ': 'ECO_TV_MOZ.jpg',
                'ST_Sports_Arena': 'ST_Sports_Arena.jpg',
                'ESPN_2': 'ESPN_2.jpg',
                'BBC_WORLD_NEWS': 'BBC_WORLD_NEWS.jpg',
                'TELESCOLA': 'TELESCOLA.jpg',
                'STAR_GOLD': 'STAR_GOLD.jpg',
                'Gospel_TV': 'Gospel_TV.jpg',
                'Zee_TV': 'Zee_TV.jpg',
                'CBEEBIES': 'CBEEBIES.jpg',
                'KINGDOM_TV': 'KINGDOM_TV.jpg',
                'ZEE_CINEMA': 'ZEE_CINEMA.jpg',
                'ST_Sino_Drama': 'ST_Sino_Drama.jpg',
                'ST_NAIJA': 'ST_NAIJA.jpg',
                'AMC': 'AMC.jpg',
                'SIC_MULHER': 'SIC_MULHER.jpg',
                'ESPN': 'ESPN.jpg',
                '__STAR_PLUS': '__STAR_PLUS.jpg',
                'AMC_Movies': 'AMC_Movies.jpg',
                'ST_World_Football': 'ST_World_Football.jpg',
                'Classica_TV': 'Classica_TV.jpg',
                'ST_Kids': 'ST_Kids.jpg',
                'TVM2_International': 'TVM2_International.jpg',
                'Gungu_TV': 'Gungu_TV.jpg',
                'Afro_Music': 'Afro_Music.jpg',
                'ST_Sport_Life': 'ST_Sport_Life.jpg',
                'STAR_LIFE': 'STAR_LIFE.jpg',
                'JimJam': 'JimJam.jpg',
                'ST_Sport_Focus': 'ST_Sport_Focus.jpg',
                'ST_Swahili': 'ST_Swahili.jpg',
                'FASHION_TV_AFRICA': 'FASHION_TV_AFRICA.jpg',
                'Zee_Bolly_Movies': 'Zee_Bolly_Movies.jpg',
                'ST_Zone': 'ST_Zone.jpg',
                'BIGGS': 'BIGGS.jpg',
                'MCM_TOP': 'MCM_TOP.jpg',
                'BabyTV': 'BabyTV.jpg'
            };
            
            const normalizedTitle = title.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
            
            for (const [key, value] of Object.entries(imageMap)) {
                if (normalizedTitle.includes(key) || key.includes(normalizedTitle) || 
                    title.toLowerCase().includes(key.toLowerCase().replace(/_/g, ' '))) {
                    return `/imagens/${value}`;
                }
            }
            
            const simpleName = title.replace(/[^a-zA-Z0-9]/g, '_') + '.jpg';
            return `/imagens/${simpleName}`;
        }

        function createCard(item, type, categoria) {
            const id = item.id || ''; 
            const title = item.titulo || item.nome || 'Sem titulo';
            let thumbUrl = item.thumb || item.logo || ''; 
            const url = item.url || ''; 
            const ano = item.ano || '';
            let fallbackIcon = 'fa-film'; 
            if (type === 'tv-movtv') fallbackIcon = 'fa-tv'; 
            if (type === 'tv-iptv') fallbackIcon = categoriaIcones[categoria] || 'fa-tv';
            
            if (type === 'tv-movtv') {
                thumbUrl = getLocalImagePath(title);
            } else if (thumbUrl) {
                thumbUrl = thumbUrl.replace(/\\\//g, '/');
                if (!thumbUrl.startsWith('http://') && !thumbUrl.startsWith('https://')) {
                    if (thumbUrl.startsWith('//')) thumbUrl = 'https:' + thumbUrl;
                    else if (thumbUrl.startsWith('/')) thumbUrl = 'https:/' + thumbUrl;
                    else thumbUrl = 'https://' + thumbUrl;
                }
            }
            
            return `<div class="card" data-id="${id}" data-title="${title}" data-url="${url}" data-type="${type}">
                <div class="thumb">
                    ${thumbUrl ? `<img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
                    <div class="fallback" style="display: ${thumbUrl ? 'none' : 'flex'}; width:100%; height:100%; align-items:center; justify-content:center;"><i class="fas ${fallbackIcon}"></i></div>
                    ${type !== 'filme' ? '<div class="live-badge"><i class="fas fa-circle"></i> AO VIVO</div>' : ''}
                </div>
                <div class="info"><div class="titulo">${title}</div><div class="meta">${ano ? `<span><i class="far fa-calendar-alt"></i> ${ano}</span>` : ''}</div></div>
            </div>`;
        }

        async function loadMore() {
            if (isLoading || !hasMore || currentMode !== 'filmes') return; isLoading = true;
            try {
                const url = `${API_BASE}/filmes?limit=50&offset=${offset}&category=${currentCategory}`;
                const res = await fetch(url); const data = await res.json(); const items = data.filmes || [];
                const grid = document.querySelector('.grid');
                items.forEach(item => { grid.insertAdjacentHTML('beforeend', createCard(item, 'filme')); });
                offset += items.length; hasMore = items.length === 50;
            } catch (e) {} finally { isLoading = false; }
        }

        async function performSearch(term) {
            const container = document.getElementById('contentContainer'); container.innerHTML = ''; setStatus(`Buscando: ${term}`);
            try {
                const res = await fetch(`${API_BASE}/buscar?q=${encodeURIComponent(term)}`);
                const data = await res.json(); const items = data.filmes || [];
                let html = '<div class="section-title"><i class="fas fa-search"></i> Resultados</div><div class="grid">';
                items.forEach(item => { html += createCard(item, 'filme'); });
                html += '</div>';
                container.innerHTML = html;
                setStatus(`${items.length} resultados`);
            } catch (e) { setStatus('Erro na busca'); }
        }

        async function openDetalhes(id) {
            setStatus('Carregando...');
            try {
                const res = await fetch(`${API_BASE}/filme/${id}`); const data = await res.json(); const filme = data.filme;
                if (filme) {
                    filmeAtual = filme;
                    document.getElementById('detalhesCapa').src = filme.capa || filme.thumb || '';
                    document.getElementById('detalhesTitulo').textContent = filme.titulo || '';
                    document.getElementById('detalhesTituloOriginal').textContent = filme.titulo_original || '';
                    document.getElementById('detalhesSinopse').textContent = filme.sinopse || 'Sinopse nao disponivel.';
                    let metaHtml = '';
                    if (filme.ano) metaHtml += `<span><i class="far fa-calendar-alt"></i> ${filme.ano}</span>`;
                    if (filme.duracao) metaHtml += `<span><i class="far fa-clock"></i> ${filme.duracao}</span>`;
                    if (filme.pais) metaHtml += `<span><i class="fas fa-globe"></i> ${filme.pais}</span>`;
                    if (filme.is_serie) metaHtml += `<span><i class="fas fa-tv"></i> Serie</span>`;
                    document.getElementById('detalhesMeta').innerHTML = metaHtml;
                    const elencoDiv = document.getElementById('detalhesElenco');
                    elencoDiv.innerHTML = filme.atores?.length ? filme.atores.map(a => `<span class="elenco-tag">${a}</span>`).join('') : '<span class="elenco-tag">Elenco nao disponivel</span>';
                    const catDiv = document.getElementById('detalhesCategorias');
                    catDiv.innerHTML = filme.categorias?.length ? filme.categorias.map(c => `<span class="categoria-tag">${c}</span>`).join('') : '';
                    document.getElementById('detalhesPage').classList.add('active');
                    setStatus(filme.titulo);
                }
            } catch (e) { setStatus('Erro ao carregar detalhes'); }
        }

        function resetAndLoad() { offset = 0; hasMore = true; document.getElementById('busca').value = ''; loadContent(); }
    </script>
</body>
</html>
