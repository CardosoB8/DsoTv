<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #0F1C2E; color: #FFFFFF; min-height: 100vh; padding-bottom: 30px; }
        
        /* Header */
        .header { background: #1A2D42; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #E50914; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .nav { display: flex; gap: 8px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: all 0.3s; }
        .nav button i { font-size: 18px; }
        .nav button.active { background: #E50914; color: #FFFFFF; }
        .search { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
        .search i { color: #B0BEC5; font-size: 16px; }
        .search input { background: none; border: none; color: #FFFFFF; outline: none; font-size: 14px; width: 200px; }
        .search input::placeholder { color: #6c7a8a; }
        
        /* Categorias */
        .categorias { padding: 16px; display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 10px 20px; border-radius: 30px; cursor: pointer; white-space: nowrap; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .categoria i { font-size: 14px; }
        .categoria.active { background: #E50914; color: #FFFFFF; }
        
        /* Seções */
        .section-title { font-size: 20px; font-weight: bold; margin: 20px 16px 10px; color: #64B5F6; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: #E50914; }
        
        /* Grid */
        .grid { padding: 0 16px 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .grid.tv-mode { grid-template-columns: 1fr; }
        .grid.tv-mode .card { display: flex; height: 90px; }
        .grid.tv-mode .card .thumb { width: 140px; height: 90px; }
        
        /* Cards */
        .card { background: #1A2D42; border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(229,9,20,0.3); }
        .card .thumb { aspect-ratio: 2/3; background: #0a1520; display: flex; align-items: center; justify-content: center; position: relative; }
        .card .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card .thumb .fallback { font-size: 40px; color: #3a5068; }
        .card .thumb .live-badge { position: absolute; top: 8px; left: 8px; background: #E50914; color: #FFF; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .card .info { padding: 14px; }
        .card .titulo { font-size: 15px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px; }
        .card .meta { font-size: 13px; color: #64B5F6; display: flex; align-items: center; gap: 6px; }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; color: #B0BEC5; }
        .loading i { font-size: 40px; color: #E50914; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Pagina de Detalhes */
        .detalhes-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F1C2E; z-index: 1000; overflow-y: auto; display: none; }
        .detalhes-page.active { display: block; }
        .detalhes-header { position: relative; }
        .detalhes-back { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border: none; color: #FFF; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .detalhes-capa { width: 100%; height: 300px; object-fit: cover; }
        .detalhes-capa-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 150px; background: linear-gradient(transparent, #0F1C2E); }
        .detalhes-content { padding: 20px; margin-top: -50px; position: relative; }
        .detalhes-titulo { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .detalhes-titulo-original { font-size: 16px; color: #B0BEC5; margin-bottom: 15px; }
        .detalhes-meta { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; color: #B0BEC5; }
        .detalhes-meta span { display: flex; align-items: center; gap: 6px; }
        .detalhes-meta i { color: #E50914; }
        .detalhes-botoes { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-primary { background: #E50914; color: #FFF; border: none; padding: 14px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #FFF; border: none; padding: 14px 25px; border-radius: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .detalhes-sinopse { margin-bottom: 25px; }
        .detalhes-sinopse h3 { font-size: 18px; margin-bottom: 10px; color: #64B5F6; }
        .detalhes-sinopse p { color: #B0BEC5; line-height: 1.6; }
        .detalhes-elenco { margin-bottom: 25px; }
        .detalhes-elenco h3 { font-size: 18px; margin-bottom: 10px; color: #64B5F6; }
        .elenco-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .elenco-tag { background: #1A2D42; padding: 8px 16px; border-radius: 20px; color: #FFF; font-size: 14px; }
        .detalhes-categorias { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .categoria-tag { background: rgba(100,181,246,0.2); color: #64B5F6; padding: 6px 14px; border-radius: 20px; font-size: 13px; }
        
        /* Player Modal */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .player-modal.active { display: flex; flex-direction: column; }
        .player-header { padding: 12px 16px; background: #1A2D42; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .player-header h3 { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; color: #FFF; }
        .player-close { background: none; border: none; color: #FFFFFF; font-size: 24px; cursor: pointer; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .player-container video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Status Bar */
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 10px 20px; font-size: 13px; color: #B0BEC5; display: flex; justify-content: space-between; z-index: 99; }
        
        /* Anuncios */
        .ad-container { display: flex; justify-content: center; padding: 10px; }
        .ad-placeholder { background: linear-gradient(135deg, #1A2D42, #2A3D52); border: 2px dashed #64B5F6; border-radius: 12px; padding: 15px; text-align: center; color: #B0BEC5; font-size: 14px; width: 100%; }
        
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(4, 1fr); } 
            .grid.tv-mode { grid-template-columns: repeat(2, 1fr); } 
            .detalhes-capa { height: 400px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo" onclick="location.reload()"><i class="fas fa-play-circle"></i> DSO TV</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv-movtv"><i class="fas fa-tv"></i> TV MOVTV</button>
            <button data-mode="tv-iptv"><i class="fas fa-satellite"></i> TV IPTV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar filmes...">
        </div>
    </div>
    
    <!-- Categorias -->
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <!-- Container de Conteudo -->
    <div id="contentContainer"></div>
    
    <!-- Loading -->
    <div class="loading" id="loading"><i class="fas fa-spinner"></i><br>Carregando...</div>
    
    <!-- Pagina de Detalhes -->
    <div class="detalhes-page" id="detalhesPage">
        <div class="detalhes-header">
            <button class="detalhes-back" id="detalhesBack"><i class="fas fa-arrow-left"></i></button>
            <img class="detalhes-capa" id="detalhesCapa" src="" alt="">
            <div class="detalhes-capa-overlay"></div>
        </div>
        <div class="detalhes-content">
            <h1 class="detalhes-titulo" id="detalhesTitulo"></h1>
            <div class="detalhes-titulo-original" id="detalhesTituloOriginal"></div>
            <div class="detalhes-meta" id="detalhesMeta"></div>
            <div class="detalhes-botoes">
                <button class="btn-primary" id="btnAssistir"><i class="fas fa-play"></i> Assistir</button>
                <button class="btn-secondary" id="btnAbrirNovaAba"><i class="fas fa-external-link-alt"></i> Abrir em nova aba</button>
            </div>
            <div class="detalhes-sinopse">
                <h3><i class="fas fa-align-left"></i> Sinopse</h3>
                <p id="detalhesSinopse"></p>
            </div>
            <div class="detalhes-elenco">
                <h3><i class="fas fa-users"></i> Elenco</h3>
                <div class="elenco-grid" id="detalhesElenco"></div>
            </div>
            <div class="detalhes-categorias" id="detalhesCategorias"></div>
        </div>
    </div>
    
    <!-- Player Modal -->
    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <h3 id="playerTitle">Reproduzindo</h3>
            <button class="player-close" id="playerClose">&times;</button>
        </div>
        <div class="player-container" id="playerContainer"></div>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
        <span id="statusMsg">Pronto</span>
        <span><i class="fas fa-wifi"></i> DSO TV</span>
    </div>

    <script>
        const API_BASE = '/api';
        let currentMode = 'filmes';
        let currentCategory = '0';
        let offset = 0;
        let isLoading = false;
        let hasMore = true;
        let searchTimeout = null;
        let filmeAtual = null;
        let currentVideoUrl = '';

        function setStatus(text) { document.getElementById('statusMsg').textContent = text; }

        // Icones por categoria
        const categoriaIcones = {
            'esportes': 'fa-futbol',
            'noticias': 'fa-newspaper',
            'documentario': 'fa-book',
            'infantil': 'fa-child',
            'filmes-series': 'fa-film',
            'variedades': 'fa-star'
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentMode = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = currentMode === 'filmes' ? 'flex' : 'none';
                    resetAndLoad();
                });
            });

            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) { currentCategory = btn.dataset.cat; resetAndLoad(); }
            });

            const searchInput = document.getElementById('busca');
            searchInput.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = e.target.value.trim();
                    if (term) performSearch(term); else if (currentMode === 'filmes') resetAndLoad();
                }, 500);
            });

            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                    if (!isLoading && hasMore && currentMode === 'filmes' && !searchInput.value) loadMore();
                }
            });

            document.getElementById('detalhesBack').addEventListener('click', () => {
                document.getElementById('detalhesPage').classList.remove('active');
            });

            document.getElementById('btnAssistir').addEventListener('click', () => {
                if (filmeAtual && filmeAtual.videoUrl) {
                    playVideo(filmeAtual.videoUrl, filmeAtual.titulo);
                }
            });

            document.getElementById('btnAbrirNovaAba').addEventListener('click', () => {
                if (filmeAtual && filmeAtual.videoUrl) {
                    window.open(filmeAtual.videoUrl, '_blank');
                }
            });

            document.getElementById('playerClose').addEventListener('click', closePlayer);
            document.getElementById('playerModal').addEventListener('click', e => {
                if (e.target.classList.contains('player-modal')) closePlayer();
            });

            document.getElementById('contentContainer').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (!card) return;
                
                const id = card.dataset.id;
                const title = card.dataset.title;
                const url = card.dataset.url;
                const type = card.dataset.type;
                
                if (type === 'filme') {
                    openDetalhes(id);
                } else if (type === 'tv-movtv') {
                    if (url) window.open(url, '_blank');
                } else if (type === 'tv-iptv') {
                    if (url) playVideo(url, title);
                }
            });

            loadCategories();
            loadContent();
        });

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('playerContainer').innerHTML = '';
            currentVideoUrl = '';
        }

        function playVideo(url, title) {
            currentVideoUrl = url;
            document.getElementById('playerTitle').textContent = title || 'Reproduzindo';
            
            const container = document.getElementById('playerContainer');
            container.innerHTML = `<video controls autoplay playsinline src="${url}"></video>`;
            
            document.getElementById('playerModal').classList.add('active');
            setStatus('Reproduzindo: ' + (title || 'video'));
            
            const video = container.querySelector('video');
            video.play().catch(e => console.log('Autoplay:', e));
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const data = await res.json();
                if (data.categorias && data.categorias.length) {
                    const container = document.getElementById('categorias');
                    container.innerHTML = '<button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>';
                    data.categorias.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {}
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true;
            offset = 0;
            hasMore = true;
            
            const container = document.getElementById('contentContainer');
            const loadingEl = document.getElementById('loading');
            
            loadingEl.style.display = 'block';
            container.innerHTML = '';
            setStatus('Carregando...');

            try {
                if (currentMode === 'filmes') {
                    await loadFilmes();
                } else if (currentMode === 'tv-movtv') {
                    await loadTVMOVTV();
                } else if (currentMode === 'tv-iptv') {
                    await loadTVIPTV();
                }
            } catch (e) {
                setStatus('Erro ao carregar');
            } finally {
                isLoading = false;
                loadingEl.style.display = 'none';
            }
        }

        async function loadFilmes() {
            const container = document.getElementById('contentContainer');
            const url = `${API_BASE}/filmes?limit=50&offset=0&category=${currentCategory}`;
            const res = await fetch(url);
            const data = await res.json();
            const items = data.filmes || [];
            
            let html = '<div class="section-title"><i class="fas fa-film"></i> Filmes</div><div class="grid">';
            items.forEach(item => {
                html += createCard(item, 'filme');
            });
            html += '</div>';
            container.innerHTML = html;
            
            offset = items.length;
            hasMore = items.length === 50;
            setStatus(`${items.length} filmes`);
        }

        async function loadTVMOVTV() {
            const container = document.getElementById('contentContainer');
            const url = `${API_BASE}/canais-movtv`;
            const res = await fetch(url);
            const data = await res.json();
            const items = data.canais || [];
            
            let html = '<div class="section-title"><i class="fas fa-tv"></i> Canais MOVTV</div><div class="grid tv-mode">';
            items.forEach(item => {
                html += createCard(item, 'tv-movtv');
            });
            html += '</div>';
            container.innerHTML = html;
            setStatus(`${items.length} canais MOVTV`);
        }

        async function loadTVIPTV() {
            const container = document.getElementById('contentContainer');
            const url = `${API_BASE}/canais-iptv`;
            const res = await fetch(url);
            const data = await res.json();
            const items = data.canais || [];
            
            const categorias = {};
            items.forEach(item => {
                const cat = item.categoria || 'variedades';
                if (!categorias[cat]) categorias[cat] = [];
                categorias[cat].push(item);
            });
            
            let html = '';
            const nomesCategorias = {
                'esportes': 'Esportes',
                'noticias': 'Noticias',
                'documentario': 'Documentarios',
                'infantil': 'Infantil',
                'filmes-series': 'Filmes e Series',
                'variedades': 'Variedades'
            };
            
            for (const [cat, canais] of Object.entries(categorias)) {
                const icone = categoriaIcones[cat] || 'fa-tv';
                html += `<div class="section-title"><i class="fas ${icone}"></i> ${nomesCategorias[cat] || cat}</div>`;
                html += '<div class="grid tv-mode">';
                canais.forEach(item => {
                    html += createCard(item, 'tv-iptv', cat);
                });
                html += '</div>';
            }
            
            container.innerHTML = html;
            setStatus(`${items.length} canais IPTV`);
        }

        function createCard(item, type, categoria) {
            const id = item.id || '';
            const title = item.titulo || item.nome || 'Sem titulo';
            let thumbUrl = item.thumb || item.logo || '';
            const url = item.url || '';
            const ano = item.ano || '';
            
            let fallbackIcon = 'fa-film';
            if (type === 'tv-movtv') fallbackIcon = 'fa-tv';
            if (type === 'tv-iptv') fallbackIcon = categoriaIcones[categoria] || 'fa-tv';
            
            return `
                <div class="card" data-id="${id}" data-title="${title}" data-url="${url}" data-type="${type}">
                    <div class="thumb">
                        ${thumbUrl ? `<img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
                        <div class="fallback" style="display: ${thumbUrl ? 'none' : 'flex'}; width:100%; height:100%; align-items:center; justify-content:center;">
                            <i class="fas ${fallbackIcon}"></i>
                        </div>
                        ${type !== 'filme' ? '<div class="live-badge"><i class="fas fa-circle"></i> AO VIVO</div>' : ''}
                    </div>
                    <div class="info">
                        <div class="titulo">${title}</div>
                        <div class="meta">${ano ? `<span><i class="far fa-calendar-alt"></i> ${ano}</span>` : ''}</div>
                    </div>
                </div>
            `;
        }

        async function loadMore() {
            if (isLoading || !hasMore || currentMode !== 'filmes') return;
            isLoading = true;
            try {
                const url = `${API_BASE}/filmes?limit=50&offset=${offset}&category=${currentCategory}`;
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || [];
                
                const grid = document.querySelector('.grid');
                items.forEach(item => {
                    grid.insertAdjacentHTML('beforeend', createCard(item, 'filme'));
                });
                
                offset += items.length;
                hasMore = items.length === 50;
            } catch (e) {} finally { isLoading = false; }
        }

        async function performSearch(term) {
            const container = document.getElementById('contentContainer');
            container.innerHTML = '';
            setStatus(`Buscando: ${term}`);
            
            try {
                const res = await fetch(`${API_BASE}/buscar?q=${encodeURIComponent(term)}`);
                const data = await res.json();
                const items = data.filmes || [];
                
                let html = '<div class="section-title"><i class="fas fa-search"></i> Resultados</div><div class="grid">';
                items.forEach(item => {
                    html += createCard(item, 'filme');
                });
                html += '</div>';
                container.innerHTML = html;
                setStatus(`${items.length} resultados`);
            } catch (e) {
                setStatus('Erro na busca');
            }
        }

        async function openDetalhes(id) {
            setStatus('Carregando detalhes...');
            try {
                const res = await fetch(`${API_BASE}/filme/${id}`);
                const data = await res.json();
                const filme = data.filme;
                
                if (filme) {
                    filmeAtual = filme;
                    
                    document.getElementById('detalhesCapa').src = filme.capa || filme.thumb || '';
                    document.getElementById('detalhesTitulo').textContent = filme.titulo || '';
                    document.getElementById('detalhesTituloOriginal').textContent = filme.titulo_original || '';
                    document.getElementById('detalhesSinopse').textContent = filme.sinopse || 'Sinopse nao disponivel.';
                    
                    let metaHtml = '';
                    if (filme.ano) metaHtml += `<span><i class="far fa-calendar-alt"></i> ${filme.ano}</span>`;
                    if (filme.duracao) metaHtml += `<span><i class="far fa-clock"></i> ${filme.duracao}</span>`;
                    if (filme.pais) metaHtml += `<span><i class="fas fa-globe"></i> ${filme.pais}</span>`;
                    if (filme.is_serie) metaHtml += `<span><i class="fas fa-tv"></i> Serie</span>`;
                    document.getElementById('detalhesMeta').innerHTML = metaHtml;
                    
                    const elencoDiv = document.getElementById('detalhesElenco');
                    elencoDiv.innerHTML = '';
                    if (filme.atores && filme.atores.length) {
                        filme.atores.forEach(ator => {
                            elencoDiv.innerHTML += `<span class="elenco-tag">${ator}</span>`;
                        });
                    } else { elencoDiv.innerHTML = '<span class="elenco-tag">Elenco nao disponivel</span>'; }
                    
                    const catDiv = document.getElementById('detalhesCategorias');
                    catDiv.innerHTML = '';
                    if (filme.categorias && filme.categorias.length) {
                        filme.categorias.forEach(cat => {
                            catDiv.innerHTML += `<span class="categoria-tag">${cat}</span>`;
                        });
                    }
                    
                    document.getElementById('detalhesPage').classList.add('active');
                    setStatus(filme.titulo);
                }
            } catch (e) { setStatus('Erro ao carregar detalhes'); }
        }

        function resetAndLoad() {
            offset = 0;
            hasMore = true;
