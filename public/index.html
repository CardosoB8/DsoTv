<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV - MÚLTIPLOS TESTES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #0F1C2E; color: #FFFFFF; min-height: 100vh; padding-bottom: 200px; }
        
        /* Header */
        .header { background: #1A2D42; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #E50914; display: flex; align-items: center; gap: 6px; }
        .nav { display: flex; gap: 8px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .nav button i { font-size: 16px; }
        .nav button.active { background: #E50914; color: #FFFFFF; }
        .search { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; }
        .search i { color: #B0BEC5; font-size: 14px; }
        .search input { background: none; border: none; color: #FFFFFF; outline: none; font-size: 14px; width: 180px; }
        .search input::placeholder { color: #6c7a8a; }
        
        /* Categorias */
        .categorias { padding: 12px 16px; display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 8px 18px; border-radius: 24px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .categoria i { font-size: 13px; }
        .categoria.active { background: #E50914; color: #FFFFFF; }
        
        /* Grid */
        .grid { padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .grid.tv-mode { grid-template-columns: 1fr; }
        .grid.tv-mode .card { display: flex; height: 80px; }
        .grid.tv-mode .card .thumb { width: 120px; height: 80px; aspect-ratio: auto; }
        .grid.tv-mode .card .info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        
        /* Cards */
        .card { background: #1A2D42; border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card:active { transform: scale(0.98); }
        .card .thumb { aspect-ratio: 2/3; background: #0a1520; display: flex; align-items: center; justify-content: center; }
        .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card .thumb .fallback { font-size: 36px; color: #3a5068; }
        .card .info { padding: 12px; }
        .card .titulo { font-size: 14px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .card .meta { font-size: 12px; color: #64B5F6; display: flex; align-items: center; gap: 4px; }
        
        /* Loading */
        .loading { text-align: center; padding: 30px; color: #B0BEC5; }
        .loading i { margin-right: 8px; }
        
        /* Anúncios */
        .ad-container { display: flex; justify-content: center; padding: 8px; }
        .ad-placeholder { background: linear-gradient(135deg, #1A2D42, #2A3D52); border: 2px dashed #64B5F6; border-radius: 8px; padding: 12px; text-align: center; color: #B0BEC5; font-size: 12px; width: 100%; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .modal.active { display: flex; flex-direction: column; }
        .modal-header { padding: 12px 16px; background: #1A2D42; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .modal-header h3 { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; color: #FFF; }
        .modal-close { background: none; border: none; color: #FFFFFF; font-size: 24px; cursor: pointer; line-height: 1; }
        .video-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 10px; }
        .video-container video,
        .video-container iframe { width: 100%; max-width: 100%; max-height: 70vh; aspect-ratio: 16 / 9; object-fit: contain; background: #000; }
        
        /* Painel de Testes */
        .test-panel { position: fixed; bottom: 30px; left: 0; right: 0; background: #0a0a0a; border-top: 3px solid #E50914; max-height: 200px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 11px; z-index: 200; }
        .test-title { color: #E50914; margin-bottom: 5px; font-weight: bold; }
        .test-url { background: #1a1a1a; padding: 6px; border-radius: 4px; word-break: break-all; color: #64B5F6; margin-bottom: 8px; font-size: 10px; }
        .test-buttons { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
        .test-btn { background: #333; color: #fff; border: none; padding: 6px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .test-btn.video1 { background: #E50914; }
        .test-btn.video2 { background: #c0392b; }
        .test-btn.iframe1 { background: #2980b9; }
        .test-btn.iframe2 { background: #2471a3; }
        .test-btn.newtab { background: #27ae60; }
        .test-btn.hlsjs { background: #8e44ad; }
        .test-btn.copy { background: #555; }
        .test-info { color: #888; font-size: 9px; }
        
        /* Status Bar */
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 8px 16px; font-size: 12px; color: #B0BEC5; display: flex; justify-content: space-between; z-index: 99; }
        
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(4, 1fr); } 
            .grid.tv-mode { grid-template-columns: repeat(2, 1fr); } 
            .search input { width: 240px; } 
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> DSO TV TESTES</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv"><i class="fas fa-tv"></i> TV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar filmes...">
        </div>
    </div>
    
    <!-- Categorias -->
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <!-- Anúncio -->
    <div class="ad-container">
        <div class="ad-placeholder"><i class="fas fa-ad"></i> Publicidade</div>
    </div>
    
    <!-- Grid -->
    <div class="grid" id="grid"></div>
    
    <!-- Anúncio -->
    <div class="ad-container">
        <div class="ad-placeholder"><i class="fas fa-ad"></i> Publicidade</div>
    </div>
    
    <!-- Loading -->
    <div class="loading" id="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 id="modalTitulo">Título</h3>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="video-container" id="videoContainer"></div>
    </div>
    
    <!-- Painel de Testes -->
    <div class="test-panel" id="testPanel">
        <div class="test-title">🔬 PAINEL DE TESTES - Clique nos botões para testar diferentes métodos</div>
        <div class="test-url" id="testUrl">Nenhuma URL ainda</div>
        <div class="test-buttons" id="testButtons" style="display:none;">
            <button class="test-btn video1" onclick="testVideoNormal()">📹 Video Normal</button>
            <button class="test-btn video2" onclick="testVideoLimitado()">📹 Video 400px</button>
            <button class="test-btn iframe1" onclick="testIframeNormal()">🖼️ Iframe Normal</button>
            <button class="test-btn iframe2" onclick="testIframeLimitado()">🖼️ Iframe 400px</button>
            <button class="test-btn hlsjs" onclick="testHlsJs()">🎬 Hls.js</button>
            <button class="test-btn newtab" onclick="testNewTab()">🔗 Nova Aba</button>
            <button class="test-btn copy" onclick="copyTestUrl()">📋 Copiar URL</button>
        </div>
        <div class="test-info" id="testInfo"></div>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
        <span id="statusMsg">Pronto</span>
        <span><i class="fas fa-flask"></i> MODO TESTE</span>
    </div>

    <!-- Hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        const API_BASE = '/api';
        let currentMode = 'filmes';
        let currentCategory = '0';
        let offset = 0;
        let isLoading = false;
        let hasMore = true;
        let searchTimeout = null;
        let currentTestUrl = '';
        let currentTitle = '';

        function setStatus(text) {
            document.getElementById('statusMsg').textContent = text;
        }
        
        function showTestPanel(url, title, mode) {
            currentTestUrl = url;
            currentTitle = title;
            
            document.getElementById('testUrl').textContent = url;
            document.getElementById('testButtons').style.display = 'flex';
            document.getElementById('testInfo').innerHTML = `
                📺 ${title} | Modo: ${mode} | ${url.length} caracteres
            `;
        }
        
        // ============= MÉTODOS DE TESTE =============
        
        function testVideoNormal() {
            if (!currentTestUrl) return;
            setStatus('🎬 Teste: Video Normal');
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.objectFit = 'contain';
            video.src = currentTestUrl;
            
            video.onerror = () => alert('❌ Video Normal falhou!');
            video.onplay = () => setStatus('▶️ Video Normal reproduzindo');
            
            container.appendChild(video);
            document.getElementById('modalTitulo').textContent = currentTitle + ' [Video Normal]';
            document.getElementById('modal').classList.add('active');
            
            video.play().catch(e => console.log('Autoplay:', e));
        }
        
        function testVideoLimitado() {
            if (!currentTestUrl) return;
            setStatus('🎬 Teste: Video 400px');
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.style.width = '100%';
            video.style.maxHeight = '400px';
            video.style.objectFit = 'contain';
            video.src = currentTestUrl;
            
            video.onerror = () => alert('❌ Video 400px falhou!');
            video.onplay = () => setStatus('▶️ Video 400px reproduzindo');
            
            container.appendChild(video);
            document.getElementById('modalTitulo').textContent = currentTitle + ' [Video 400px]';
            document.getElementById('modal').classList.add('active');
            
            video.play().catch(e => console.log('Autoplay:', e));
        }
        
        function testIframeNormal() {
            if (!currentTestUrl) return;
            setStatus('🖼️ Teste: Iframe Normal');
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.src = currentTestUrl;
            iframe.allow = 'autoplay; encrypted-media; fullscreen';
            iframe.allowfullscreen = true;
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            
            container.appendChild(iframe);
            document.getElementById('modalTitulo').textContent = currentTitle + ' [Iframe Normal]';
            document.getElementById('modal').classList.add('active');
        }
        
        function testIframeLimitado() {
            if (!currentTestUrl) return;
            setStatus('🖼️ Teste: Iframe 400px');
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.src = currentTestUrl;
            iframe.allow = 'autoplay; encrypted-media; fullscreen';
            iframe.allowfullscreen = true;
            iframe.style.width = '100%';
            iframe.style.maxHeight = '400px';
            
            container.appendChild(iframe);
            document.getElementById('modalTitulo').textContent = currentTitle + ' [Iframe 400px]';
            document.getElementById('modal').classList.add('active');
        }
        
        function testHlsJs() {
            if (!currentTestUrl) return;
            setStatus('🎬 Teste: Hls.js');
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.style.width = '100%';
            video.style.maxHeight = '400px';
            container.appendChild(video);
            
            if (Hls.isSupported()) {
                const hls = new Hls({ debug: false });
                hls.loadSource(currentTestUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    setStatus('✅ Hls.js: Manifest carregado');
                    video.play().catch(e => console.log('Play error:', e));
                });
                hls.on(Hls.Events.ERROR, (e, d) => {
                    alert('❌ Hls.js erro: ' + d.details);
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = currentTestUrl;
                video.play().catch(e => console.log('Play error:', e));
                setStatus('🍎 HLS Nativo (Safari)');
            } else {
                alert('❌ HLS não suportado');
            }
            
            document.getElementById('modalTitulo').textContent = currentTitle + ' [Hls.js]';
            document.getElementById('modal').classList.add('active');
        }
        
        function testNewTab() {
            if (!currentTestUrl) return;
            window.open(currentTestUrl, '_blank');
            setStatus('🔗 Aberto em nova aba');
        }
        
        function copyTestUrl() {
            if (!currentTestUrl) return;
            navigator.clipboard?.writeText(currentTestUrl).then(() => {
                setStatus('📋 URL copiada!');
            }).catch(() => {
                prompt('Copie manualmente:', currentTestUrl);
            });
        }

        // ============= INICIALIZAÇÃO =============
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentMode = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = currentMode === 'filmes' ? 'flex' : 'none';
                    document.getElementById('grid').classList.toggle('tv-mode', currentMode === 'tv');
                    resetAndLoad();
                });
            });

            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) {
                    currentCategory = btn.dataset.cat;
                    document.querySelectorAll('.categoria').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    resetAndLoad();
                }
            });

            const searchInput = document.getElementById('busca');
            searchInput.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = e.target.value.trim();
                    if (term) performSearch(term);
                    else if (currentMode === 'filmes') resetAndLoad();
                }, 500);
            });

            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                    if (!isLoading && hasMore && currentMode === 'filmes' && !searchInput.value) {
                        loadMore();
                    }
                }
            });

            document.getElementById('modalClose').addEventListener('click', () => {
                document.getElementById('modal').classList.remove('active');
                document.getElementById('videoContainer').innerHTML = '';
            });
            
            document.getElementById('modal').addEventListener('click', e => {
                if (e.target.classList.contains('modal')) {
                    document.getElementById('modal').classList.remove('active');
                    document.getElementById('videoContainer').innerHTML = '';
                }
            });

            document.getElementById('grid').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (card) openContent(card.dataset.id, card.dataset.title);
            });

            loadCategories();
            loadContent();
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const data = await res.json();
                if (data.categorias && data.categorias.length) {
                    const container = document.getElementById('categorias');
                    const allBtn = container.querySelector('[data-cat="0"]');
                    container.innerHTML = '';
                    container.appendChild(allBtn.cloneNode(true));
                    data.categorias.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {}
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true;
            offset = 0;
            hasMore = true;
            document.getElementById('loading').style.display = 'block';
            setStatus('Carregando...');
            document.getElementById('grid').innerHTML = '';

            try {
                let url = currentMode === 'filmes' 
                    ? `${API_BASE}/filmes?limit=50&offset=0&category=${currentCategory}`
                    : `${API_BASE}/canais`;
                
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || data.canais || [];
                renderItems(items, true);
                offset = items.length;
                hasMore = currentMode === 'filmes' && items.length === 50;
                setStatus(`${items.length} itens`);
            } catch (e) {
                setStatus('Erro ao carregar');
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            try {
                const url = `${API_BASE}/filmes?limit=50&offset=${offset}&category=${currentCategory}`;
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || [];
                renderItems(items, false);
                offset += items.length;
                hasMore = items.length === 50;
            } catch (e) {} finally {
                isLoading = false;
            }
        }

        async function performSearch(term) {
            document.getElementById('grid').innerHTML = '';
            setStatus(`Buscando: ${term}`);
            try {
                const res = await fetch(`${API_BASE}/buscar?q=${encodeURIComponent(term)}`);
                const data = await res.json();
                renderItems(data.filmes || [], true);
                setStatus(`${data.filmes?.length || 0} resultados`);
            } catch (e) {
                setStatus('Erro na busca');
            }
        }

        function renderItems(items, clear) {
            const grid = document.getElementById('grid');
            if (clear) grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.dataset.title = item.titulo || item.title;
                
                let thumbUrl = item.thumb || '';
                if (!thumbUrl && currentMode === 'tv') {
                    thumbUrl = item.logo || item.cover || '';
                }
                
                card.innerHTML = `
                    <div class="thumb">
                        ${thumbUrl ? `<img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
                        <div class="fallback" style="display: ${thumbUrl ? 'none' : 'flex'}; width:100%; height:100%; align-items:center; justify-content:center;">
                            <i class="fas fa-${currentMode === 'tv' ? 'tv' : 'film'}"></i>
                        </div>
                    </div>
                    <div class="info">
                        <div class="titulo">${item.titulo || item.title || 'Sem título'}</div>
                        <div class="meta">
                            ${currentMode === 'tv' ? '<i class="fas fa-circle" style="color:#39FF14; font-size:8px;"></i> AO VIVO' : ''}
                            ${item.ano ? `<span><i class="far fa-calendar-alt"></i> ${item.ano}</span>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function openContent(id, title) {
            setStatus(`Abrindo ${title}`);
            try {
                const endpoint = currentMode === 'filmes' ? `filme/${id}` : `canal/${id}`;
                const res = await fetch(`${API_BASE}/${endpoint}`);
                const data = await res.json();
                const item = data.filme || data.canal;
                
                if (item && item.videoUrl) {
                    // Mostrar painel de testes
                    showTestPanel(item.videoUrl, item.titulo || title, currentMode);
                    
                    // Tentar reprodução automática com o método mais compatível
                    const container = document.getElementById('videoContainer');
                    container.innerHTML = '';
                    
                    if (currentMode === 'tv') {
                        // Para TV, testar iframe primeiro
                        const iframe = document.createElement('iframe');
                        iframe.src = item.videoUrl;
                        iframe.allow = 'autoplay; encrypted-media; fullscreen';
                        iframe.allowfullscreen = true;
                        iframe.style.width = '100%';
                        iframe.style.maxHeight = '400px';
                        container.appendChild(iframe);
                        setStatus(`🖼️ TV em iframe: ${item.titulo || title}`);
                    } else {
                        // Para filmes, video tag
                        const video = document.createElement('video');
                        video.controls = true;
                        video.autoplay = true;
                        video.playsInline = true;
                        video.style.width = '100%';
                        video.style.maxHeight = '400px';
                        video.style.objectFit = 'contain';
                        video.src = item.videoUrl;
                        
                        video.onerror = () => setStatus('❌ Erro no player automático - use os botões de teste');
                        video.onplay = () => setStatus(`▶️ ${item.titulo || title}`);
                        
                        container.appendChild(video);
                        video.play().catch(e => console.log('Autoplay:', e));
                    }
                    
                    document.getElementById('modalTitulo').textContent = item.titulo || title;
                    document.getElementById('modal').classList.add('active');
                    
                } else {
                    setStatus('Vídeo não disponível');
                    alert('Conteúdo indisponível no momento.');
                }
            } catch (e) {
                console.error('Erro:', e);
                setStatus('Erro ao abrir');
                alert('Falha ao carregar o conteúdo.');
            }
        }

        function resetAndLoad() {
            offset = 0;
            hasMore = true;
            document.getElementById('grid').innerHTML = '';
            document.getElementById('busca').value = '';
            loadContent();
        }
    </script>
</body>
</html>
