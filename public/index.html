<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #0F1C2E; color: #FFFFFF; min-height: 100vh; }
        .header { background: #1A2D42; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #E50914; display: flex; align-items: center; gap: 6px; }
        .nav { display: flex; gap: 8px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .nav button i { font-size: 16px; }
        .nav button.active { background: #E50914; color: #FFFFFF; }
        .search { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; }
        .search i { color: #B0BEC5; font-size: 14px; }
        .search input { background: none; border: none; color: #FFFFFF; outline: none; font-size: 14px; width: 180px; }
        .search input::placeholder { color: #6c7a8a; }
        .categorias { padding: 12px 16px; display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 8px 18px; border-radius: 24px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .categoria i { font-size: 13px; }
        .categoria.active { background: #E50914; color: #FFFFFF; }
        .grid { padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .card { background: #1A2D42; border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card:active { transform: scale(0.98); }
        .card .thumb { aspect-ratio: 2/3; background: #0a1520; display: flex; align-items: center; justify-content: center; }
        .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card .thumb .fallback { font-size: 36px; color: #3a5068; }
        .card .info { padding: 12px; }
        .card .titulo { font-size: 14px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .card .meta { font-size: 12px; color: #64B5F6; display: flex; align-items: center; gap: 4px; }
        .loading { text-align: center; padding: 30px; color: #B0BEC5; }
        .loading i { margin-right: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { width: 95%; max-width: 900px; background: #0F1C2E; border-radius: 18px; overflow: hidden; }
        .modal-header { padding: 16px 20px; background: #1A2D42; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
        .modal-close { background: none; border: none; color: #FFFFFF; font-size: 26px; cursor: pointer; line-height: 1; }
        .video-container { aspect-ratio: 16/9; background: #000; }
        .modal-info { padding: 16px 20px; color: #B0BEC5; font-size: 13px; max-height: 120px; overflow-y: auto; }
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 8px 16px; font-size: 12px; color: #B0BEC5; display: flex; justify-content: space-between; z-index: 99; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } .search input { width: 240px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> DSO TV</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv"><i class="fas fa-tv"></i> TV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar filmes...">
        </div>
    </div>
    
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <div class="grid" id="grid"></div>
    <div class="loading" id="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitulo">Título</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="video-container">
                <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
            </div>
            <div class="modal-info" id="modalInfo"></div>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="statusMsg">Pronto</span>
        <span><i class="fas fa-wifi"></i> DSO TV</span>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script>
        // Configuração global
        const API_BASE = '/api';
        let player = null;
        let currentMode = 'filmes';
        let currentCategory = '0';
        let offset = 0;
        let isLoading = false;
        let hasMore = true;
        let searchTimeout = null;

        function setStatus(text) {
            document.getElementById('statusMsg').textContent = text;
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Inicializa player com suporte a HLS
            player = videojs('player', {
                controls: true,
                autoplay: false,
                preload: 'auto',
                fluid: true,
                playbackRates: [0.5, 1, 1.5, 2],
                html5: {
                    hls: {
                        overrideNative: true
                    }
                }
            });

            // Event listeners
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentMode = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = currentMode === 'filmes' ? 'flex' : 'none';
                    resetAndLoad();
                });
            });

            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) {
                    currentCategory = btn.dataset.cat;
                    document.querySelectorAll('.categoria').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    resetAndLoad();
                }
            });

            const searchInput = document.getElementById('busca');
            searchInput.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = e.target.value.trim();
                    if (term) performSearch(term);
                    else if (currentMode === 'filmes') resetAndLoad();
                }, 500);
            });

            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                    if (!isLoading && hasMore && currentMode === 'filmes' && !searchInput.value) {
                        loadMore();
                    }
                }
            });

            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modal').addEventListener('click', e => {
                if (e.target.classList.contains('modal')) closeModal();
            });

            document.getElementById('grid').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (card) openContent(card.dataset.id, card.dataset.title);
            });

            // Iniciar
            loadCategories();
            loadContent();
        });

        function closeModal() {
            player.pause();
            player.reset();
            document.getElementById('modal').classList.remove('active');
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const data = await res.json();
                if (data.categorias && data.categorias.length) {
                    const container = document.getElementById('categorias');
                    const allBtn = container.querySelector('[data-cat="0"]');
                    container.innerHTML = '';
                    container.appendChild(allBtn.cloneNode(true));
                    data.categorias.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {
                console.warn('Categorias indisponíveis');
            }
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true;
            offset = 0;
            hasMore = true;
            document.getElementById('loading').style.display = 'block';
            setStatus('Carregando...');
            document.getElementById('grid').innerHTML = '';

            try {
                let url;
                if (currentMode === 'filmes') {
                    url = `${API_BASE}/filmes?limit=50&offset=0&category=${currentCategory}`;
                } else {
                    url = `${API_BASE}/canais`;
                }
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || data.canais || [];
                renderItems(items, true);
                offset = items.length;
                hasMore = currentMode === 'filmes' && items.length === 50;
                setStatus(`${items.length} itens`);
            } catch (e) {
                setStatus('Erro ao carregar');
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            try {
                const url = `${API_BASE}/filmes?limit=50&offset=${offset}&category=${currentCategory}`;
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || [];
                renderItems(items, false);
                offset += items.length;
                hasMore = items.length === 50;
            } catch (e) {} finally {
                isLoading = false;
            }
        }

        async function performSearch(term) {
            document.getElementById('grid').innerHTML = '';
            setStatus(`Buscando: ${term}`);
            try {
                const res = await fetch(`${API_BASE}/buscar?q=${encodeURIComponent(term)}`);
                const data = await res.json();
                renderItems(data.filmes || [], true);
                setStatus(`${data.filmes?.length || 0} resultados`);
            } catch (e) {
                setStatus('Erro na busca');
            }
        }

        function renderItems(items, clear) {
            const grid = document.getElementById('grid');
            if (clear) grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.dataset.title = item.titulo || item.title;
                const thumbUrl = item.thumb || '';
                card.innerHTML = `
                    <div class="thumb">
                        ${thumbUrl ? `<img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
                        <div class="fallback" style="display: ${thumbUrl ? 'none' : 'flex'}; width:100%; height:100%; align-items:center; justify-content:center;">
                            <i class="fas fa-${currentMode === 'tv' ? 'tv' : 'film'}"></i>
                        </div>
                    </div>
                    <div class="info">
                        <div class="titulo">${item.titulo || item.title || 'Sem título'}</div>
                        <div class="meta">
                            ${currentMode === 'tv' ? '<i class="fas fa-circle" style="color:#39FF14; font-size:8px;"></i> AO VIVO' : ''}
                            ${item.ano ? `<span><i class="far fa-calendar-alt"></i> ${item.ano}</span>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function openContent(id, title) {
            setStatus(`Abrindo ${title}`);
            try {
                const endpoint = currentMode === 'filmes' ? `filme/${id}` : `canal/${id}`;
                const res = await fetch(`${API_BASE}/${endpoint}`);
                const data = await res.json();
                const item = data.filme || data.canal;
                
                if (item && item.videoUrl) {
                    document.getElementById('modalTitulo').textContent = item.titulo || title;
                    let infoHtml = '';
                    if (item.ano) infoHtml += `<span><i class="far fa-calendar-alt"></i> ${item.ano}</span> `;
                    if (item.duracao) infoHtml += `<span><i class="far fa-clock"></i> ${item.duracao}</span> `;
                    if (item.pais) infoHtml += `<span><i class="fas fa-globe"></i> ${item.pais}</span>`;
                    if (item.descricao) infoHtml += `<p style="margin-top:8px;">${item.descricao.substring(0, 250)}${item.descricao.length > 250 ? '...' : ''}</p>`;
                    document.getElementById('modalInfo').innerHTML = infoHtml || (currentMode === 'tv' ? '<span><i class="fas fa-circle" style="color:#39FF14;"></i> Transmissão ao vivo</span>' : '');
                    
                    player.src({
                        src: item.videoUrl,
                        type: item.videoUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4'
                    });
                    player.ready(() => {
                        player.play().catch(e => console.log('Autoplay bloqueado'));
                    });
                    document.getElementById('modal').classList.add('active');
                    setStatus(`Reproduzindo: ${item.titulo || title}`);
                } else {
                    setStatus('Vídeo não disponível');
                    alert('Conteúdo indisponível no momento.');
                }
            } catch (e) {
                setStatus('Erro ao abrir');
                alert('Falha ao carregar o conteúdo.');
            }
        }

        function resetAndLoad() {
            offset = 0;
            hasMore = true;
            document.getElementById('grid').innerHTML = '';
            document.getElementById('busca').value = '';
            loadContent();
        }
    </script>
</body>
</html>
