<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV - DEBUG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0F1C2E; color: #fff; min-height: 100vh; padding-bottom: 320px; }
        
        .header { background: #1A2D42; padding: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .logo { font-size: 20px; font-weight: bold; color: #E50914; }
        .nav { display: flex; gap: 8px; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .nav button.active { background: #E50914; color: #fff; }
        .search { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; margin-left: auto; }
        .search input { background: none; border: none; color: #fff; outline: none; width: 150px; }
        
        .categorias { padding: 12px; display: flex; gap: 8px; overflow-x: auto; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .categoria.active { background: #E50914; color: #fff; }
        
        .grid { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: #1A2D42; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #0a1520; }
        .card .info { padding: 10px; }
        .card .titulo { font-size: 12px; font-weight: bold; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card .id-badge { font-size: 9px; color: #64B5F6; margin-top: 3px; }
        
        .loading { text-align: center; padding: 20px; color: #B0BEC5; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { width: 95%; max-width: 800px; background: #0F1C2E; border-radius: 16px; overflow: hidden; }
        .modal-header { padding: 15px; background: #1A2D42; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .video-container { aspect-ratio: 16/9; background: #000; }
        #modalInfo { padding: 15px; color: #B0BEC5; font-size: 12px; max-height: 120px; overflow-y: auto; }
        
        /* ========== PAINEL DE DEBUG ========== */
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 3px solid #E50914;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            z-index: 999;
        }
        
        .debug-header {
            background: #1A2D42;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }
        
        .debug-header h3 { color: #E50914; font-size: 13px; }
        .debug-header button { background: #E50914; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        .debug-content { padding: 10px; }
        
        .debug-item {
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        .debug-time { color: #888; font-size: 10px; margin-bottom: 3px; }
        
        .debug-url {
            background: #1a1a1a;
            padding: 6px;
            border-radius: 4px;
            color: #64B5F6;
            word-break: break-all;
            margin-bottom: 5px;
            font-size: 10px;
        }
        
        .debug-response {
            background: #0a2a0a;
            padding: 6px;
            border-radius: 4px;
            color: #4CAF50;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            font-size: 10px;
            white-space: pre-wrap;
        }
        
        .debug-error {
            background: #2a0a0a;
            color: #f44336;
        }
        
        .status-bar {
            background: #1A2D42;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }
        
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> DSO TV DEBUG</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv"><i class="fas fa-tv"></i> TV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar...">
        </div>
    </div>
    
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <div class="grid" id="grid"></div>
    <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitulo">Título</span>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="video-container">
                <video id="player" class="video-js vjs-default-skin" controls></video>
            </div>
            <div id="modalInfo"></div>
        </div>
    </div>
    
    <!-- PAINEL DE DEBUG VISUAL -->
    <div class="debug-panel" id="debugPanel">
        <div class="debug-header">
            <h3><i class="fas fa-bug"></i> DEBUG - URL COMPLETA E RESPOSTA</h3>
            <button id="clearDebug">Limpar</button>
        </div>
        <div class="debug-content" id="debugContent">
            <div style="color:#888;text-align:center;padding:20px;">⏳ Aguardando requisições...</div>
        </div>
        <div class="status-bar">
            <span id="debugStatus">🟡 Aguardando</span>
            <span id="debugCount">0 requisições</span>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script>
        // ========== DEBUG VISUAL ==========
        let debugRequests = [];
        let requestCount = 0;
        
        function addDebug(url, response, isError = false) {
            requestCount++;
            const time = new Date().toLocaleTimeString();
            
            const item = { time, url, response, isError };
            debugRequests.unshift(item);
            if (debugRequests.length > 20) debugRequests.pop();
            
            renderDebug();
            document.getElementById('debugCount').textContent = requestCount + ' requisições';
            
            const statusEl = document.getElementById('debugStatus');
            if (isError) {
                statusEl.innerHTML = '🔴 Erro';
            } else if (response && response.includes('"code":0')) {
                statusEl.innerHTML = '🟢 Sucesso';
            } else {
                statusEl.innerHTML = '🟡 ' + requestCount;
            }
        }
        
        function renderDebug() {
            const container = document.getElementById('debugContent');
            
            if (debugRequests.length === 0) {
                container.innerHTML = '<div style="color:#888;text-align:center;padding:20px;">⏳ Aguardando requisições...</div>';
                return;
            }
            
            container.innerHTML = debugRequests.map(item => `
                <div class="debug-item">
                    <div class="debug-time">🕐 ${item.time}</div>
                    <div class="debug-url">📤 ${item.url}</div>
                    <div class="debug-response ${item.isError ? 'debug-error' : ''}">📥 ${item.response}</div>
                </div>
            `).join('');
        }
        
        document.getElementById('clearDebug').addEventListener('click', () => {
            debugRequests = [];
            requestCount = 0;
            renderDebug();
            document.getElementById('debugCount').textContent = '0 requisições';
            document.getElementById('debugStatus').innerHTML = '🟡 Aguardando';
        });
        
        // Wrapper do fetch com debug
        async function apiFetch(url) {
            const fullUrl = window.location.origin + url;
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = text;
                }
                
                // Mostra a URL chamada e o debug do servidor
                let debugUrl = fullUrl;
                let debugResponse = text.substring(0, 500);
                
                // Se o servidor retornou _debug, usa ele!
                if (data._debug) {
                    debugUrl = data._debug.url || fullUrl;
                    debugResponse = data._debug.response || text;
                }
                
                addDebug(debugUrl, debugResponse, !res.ok);
                
                return data;
            } catch (error) {
                addDebug(fullUrl, 'ERRO: ' + error.message, true);
                throw error;
            }
        }
        
        // ========== APP ==========
        let modo = 'filmes';
        let categoria = '0';
        let offset = 0;
        let carregando = false;
        let temMais = true;
        let player = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('player');
            
            addDebug('🚀 APLICATIVO INICIADO', 'Modo: ' + modo);
            
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    modo = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = modo === 'filmes' ? 'flex' : 'none';
                    resetar();
                });
            });
            
            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) {
                    categoria = btn.dataset.cat;
                    document.querySelectorAll('.categoria').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    resetar();
                }
            });
            
            let timeout;
            document.getElementById('busca').addEventListener('input', e => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    if (e.target.value) buscar(e.target.value);
                    else if (modo === 'filmes') carregar();
                }, 500);
            });
            
            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
                    if (!carregando && temMais && modo === 'filmes' && !document.getElementById('busca').value) {
                        carregarMais();
                    }
                }
            });
            
            document.getElementById('modalClose').addEventListener('click', () => {
                player.pause();
                document.getElementById('modal').classList.remove('active');
            });
            
            document.getElementById('grid').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (card) abrir(card.dataset.id);
            });
            
            carregarCategorias();
            carregar();
        });
        
        async function carregarCategorias() {
            try {
                const data = await apiFetch('/api/categorias');
                
                if (data.categorias && data.categorias.length > 0) {
                    const container = document.getElementById('categorias');
                    const allBtn = container.querySelector('[data-cat="0"]');
                    container.innerHTML = '';
                    container.appendChild(allBtn.cloneNode(true));
                    
                    data.categorias.forEach(c => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = c.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${c.nome}`;
                        container.appendChild(btn);
                    });
                    
                    addDebug('✅ CATEGORIAS', data.categorias.length + ' categorias carregadas');
                } else {
                    addDebug('⚠️ CATEGORIAS', 'Nenhuma categoria retornada', true);
                }
            } catch (e) {
                addDebug('❌ CATEGORIAS', e.message, true);
            }
        }
        
        async function carregar() {
            if (carregando) return;
            carregando = true;
            offset = 0;
            document.getElementById('loading').style.display = 'block';
            
            try {
                const url = modo === 'filmes' 
                    ? `/api/filmes?limit=50&offset=0&category=${categoria}`
                    : '/api/canais';
                
                const data = await apiFetch(url);
                const itens = data.filmes || data.canais || [];
                
                addDebug('📦 ITENS RECEBIDOS', itens.length + ' itens');
                
                if (itens.length > 0) {
                    renderizar(itens, true);
                    offset = itens.length;
                    temMais = itens.length === 50;
                } else {
                    addDebug('⚠️ VAZIO', 'Nenhum item retornado', true);
                    temMais = false;
                }
            } catch (e) {
                addDebug('❌ ERRO', e.message, true);
            } finally {
                carregando = false;
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        async function carregarMais() {
            if (carregando || !temMais) return;
            carregando = true;
            
            try {
                const url = `/api/filmes?limit=50&offset=${offset}&category=${categoria}`;
                const data = await apiFetch(url);
                const itens = data.filmes || [];
                
                if (itens.length > 0) {
                    renderizar(itens, false);
                    offset += itens.length;
                    temMais = itens.length === 50;
                    addDebug('📦 MAIS ITENS', itens.length + ' itens (total: ' + offset + ')');
                } else {
                    temMais = false;
                }
            } catch (e) {} finally {
                carregando = false;
            }
        }
        
        async function buscar(q) {
            document.getElementById('grid').innerHTML = '';
            
            try {
                const data = await apiFetch(`/api/buscar?q=${encodeURIComponent(q)}`);
                
                if (data.filmes && data.filmes.length > 0) {
                    renderizar(data.filmes, true);
                    addDebug('🔍 BUSCA', data.filmes.length + ' resultados para "' + q + '"');
                } else {
                    addDebug('⚠️ BUSCA', 'Nenhum resultado para "' + q + '"', true);
                }
            } catch (e) {
                addDebug('❌ BUSCA', e.message, true);
            }
        }
        
        async function abrir(id) {
            try {
                const url = modo === 'filmes' ? `/api/filme/${id}` : `/api/canal/${id}`;
                const data = await apiFetch(url);
                const item = data.filme || data.canal;
                
                if (item && item.videoUrl) {
                    document.getElementById('modalTitulo').textContent = item.titulo || '';
                    document.getElementById('modalInfo').innerHTML = `
                        ${item.ano ? '📅 ' + item.ano + ' ' : ''}
                        ${item.duracao ? '⏱️ ' + item.duracao + ' ' : ''}
                        ${item.pais ? '🌍 ' + item.pais : ''}
                        ${item.descricao ? '<br><br>' + item.descricao.substring(0, 200) + '...' : ''}
                        <br><br>🎥 <span style="color:#64B5F6;">${item.videoUrl.substring(0, 60)}...</span>
                    `;
                    
                    player.src({
                        src: item.videoUrl,
                        type: item.videoUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4'
                    });
                    
                    document.getElementById('modal').classList.add('active');
                    addDebug('▶️ PLAYER', 'Tocando: ' + item.titulo);
                } else {
                    addDebug('❌ VÍDEO', 'URL não encontrada para ID: ' + id, true);
                    alert('Vídeo não disponível');
                }
            } catch (e) {
                addDebug('❌ PLAYER', e.message, true);
                alert('Erro ao abrir');
            }
        }
        
        function renderizar(itens, limpar) {
            const grid = document.getElementById('grid');
            if (limpar) grid.innerHTML = '';
            
            itens.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.innerHTML = `
                    ${item.thumb ? `<img src="${item.thumb}" onerror="this.style.display='none'">` : '<div style="aspect-ratio:2/3;background:#0a1520;"></div>'}
                    <div class="info">
                        <div class="titulo">${item.titulo || item.title || 'Sem título'}</div>
                        <div class="id-badge">ID: ${item.id}</div>
                    </div>
                `;
                grid.appendChild(card);
                
                if (i === 0 && limpar) {
                    addDebug('📋 PRIMEIRO ITEM', JSON.stringify(item).substring(0, 300));
                }
            });
        }
        
        function resetar() {
            offset = 0;
            temMais = true;
            document.getElementById('grid').innerHTML = '';
            document.getElementById('busca').value = '';
            carregar();
        }
    </script>
</body>
</html>
