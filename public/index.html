<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV - TODOS OS MÉTODOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #0F1C2E; color: #FFFFFF; min-height: 100vh; padding-bottom: 250px; }
        
        .header { background: #1A2D42; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #E50914; display: flex; align-items: center; gap: 6px; }
        .nav { display: flex; gap: 8px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .nav button i { font-size: 16px; }
        .nav button.active { background: #E50914; color: #FFFFFF; }
        .search { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; }
        .search i { color: #B0BEC5; font-size: 14px; }
        .search input { background: none; border: none; color: #FFFFFF; outline: none; font-size: 14px; width: 180px; }
        .search input::placeholder { color: #6c7a8a; }
        
        .categorias { padding: 12px 16px; display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 8px 18px; border-radius: 24px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .categoria i { font-size: 13px; }
        .categoria.active { background: #E50914; color: #FFFFFF; }
        
        .grid { padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .grid.tv-mode { grid-template-columns: 1fr; }
        .grid.tv-mode .card { display: flex; height: 80px; }
        .grid.tv-mode .card .thumb { width: 120px; height: 80px; aspect-ratio: auto; }
        .grid.tv-mode .card .info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        
        .card { background: #1A2D42; border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card:active { transform: scale(0.98); }
        .card .thumb { aspect-ratio: 2/3; background: #0a1520; display: flex; align-items: center; justify-content: center; }
        .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card .thumb .fallback { font-size: 36px; color: #3a5068; }
        .card .info { padding: 12px; }
        .card .titulo { font-size: 14px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .card .meta { font-size: 12px; color: #64B5F6; display: flex; align-items: center; gap: 4px; }
        
        .loading { text-align: center; padding: 30px; color: #B0BEC5; }
        .loading i { margin-right: 8px; }
        
        .ad-container { display: flex; justify-content: center; padding: 8px; }
        .ad-placeholder { background: linear-gradient(135deg, #1A2D42, #2A3D52); border: 2px dashed #64B5F6; border-radius: 8px; padding: 12px; text-align: center; color: #B0BEC5; font-size: 12px; width: 100%; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .modal.active { display: flex; flex-direction: column; }
        .modal-header { padding: 12px 16px; background: #1A2D42; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .modal-header h3 { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; color: #FFF; }
        .modal-actions { display: flex; gap: 5px; }
        .modal-action-btn { background: #333; color: #fff; border: none; padding: 5px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .modal-action-btn.newtab { background: #27ae60; }
        .modal-close { background: none; border: none; color: #FFFFFF; font-size: 24px; cursor: pointer; line-height: 1; margin-left: 5px; }
        .video-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 10px; }
        .video-container video, .video-container iframe { width: 100%; max-width: 100%; max-height: 60vh; aspect-ratio: 16 / 9; object-fit: contain; background: #000; border: none; }
        
        /* Painel de Métodos */
        .methods-panel { position: fixed; bottom: 30px; left: 0; right: 0; background: #0a0a0a; border-top: 3px solid #E50914; max-height: 220px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 10px; z-index: 200; }
        .methods-title { color: #E50914; margin-bottom: 5px; font-weight: bold; display: flex; justify-content: space-between; }
        .methods-url { background: #1a1a1a; padding: 5px; border-radius: 4px; word-break: break-all; color: #64B5F6; margin-bottom: 8px; font-size: 9px; }
        .methods-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .method-btn { background: #333; color: #fff; border: none; padding: 6px 5px; border-radius: 4px; font-size: 9px; cursor: pointer; }
        .method-btn.primary { background: #E50914; }
        .method-btn.success { background: #27ae60; }
        .method-btn.warning { background: #f39c12; }
        .method-btn.info { background: #2980b9; }
        .method-btn.purple { background: #8e44ad; }
        
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 8px 16px; font-size: 12px; color: #B0BEC5; display: flex; justify-content: space-between; z-index: 99; }
        
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(4, 1fr); } 
            .grid.tv-mode { grid-template-columns: repeat(2, 1fr); } 
            .search input { width: 240px; } 
            .methods-grid { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> DSO TV - LAB</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv"><i class="fas fa-tv"></i> TV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar filmes...">
        </div>
    </div>
    
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <div class="ad-container"><div class="ad-placeholder"><i class="fas fa-ad"></i> Publicidade</div></div>
    <div class="grid" id="grid"></div>
    <div class="ad-container"><div class="ad-placeholder"><i class="fas fa-ad"></i> Publicidade</div></div>
    <div class="loading" id="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 id="modalTitulo">Título</h3>
            <div class="modal-actions">
                <button class="modal-action-btn" id="modalCopyBtn">📋 Copiar</button>
                <button class="modal-action-btn newtab" id="modalNewTabBtn">🔗 Nova Aba</button>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
        </div>
        <div class="video-container" id="videoContainer"></div>
    </div>
    
    <!-- Painel de Métodos -->
    <div class="methods-panel" id="methodsPanel">
        <div class="methods-title">
            <span>🧪 LABORATÓRIO DE TESTES - 12 MÉTODOS</span>
            <button id="clearMethodsBtn" style="background:none;border:none;color:#888;cursor:pointer;">🗑️</button>
        </div>
        <div class="methods-url" id="methodsUrl">Clique em um canal para testar</div>
        <div class="methods-grid" id="methodsGrid" style="display:none;">
            <button class="method-btn primary" data-method="video">📹 Video</button>
            <button class="method-btn info" data-method="iframe">🖼️ Iframe</button>
            <button class="method-btn success" data-method="srcdoc">📄 srcdoc</button>
            <button class="method-btn warning" data-method="blob">💾 Blob URL</button>
            <button class="method-btn purple" data-method="embed">🎬 Embed</button>
            <button class="method-btn" data-method="object">📦 Object</button>
            <button class="method-btn info" data-method="sandbox">🏖️ Sandbox</button>
            <button class="method-btn success" data-method="noreferrer">🔒 No-Referrer</button>
            <button class="method-btn warning" data-method="redirect">↗️ Redirect</button>
            <button class="method-btn purple" data-method="hlsjs">🎬 Hls.js</button>
            <button class="method-btn" data-method="videojs">📼 Video.js</button>
            <button class="method-btn success" data-method="newtab">🔗 Nova Aba</button>
        </div>
        <div id="methodsStatus" style="color:#888; margin-top:5px; font-size:9px;"></div>
    </div>
    
    <div class="status-bar">
        <span id="statusMsg">Pronto - Clique em um canal para testar 12 métodos!</span>
        <span><i class="fas fa-flask"></i> LAB</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    
    <script>
        const API_BASE = '/api';
        let currentMode = 'filmes';
        let currentCategory = '0';
        let offset = 0;
        let isLoading = false;
        let hasMore = true;
        let searchTimeout = null;
        let currentVideoUrl = '';
        let currentVideoTitle = '';
        let currentPlayer = null;

        function setStatus(text) {
            document.getElementById('statusMsg').textContent = text;
        }

        // ============= 12 MÉTODOS DE REPRODUÇÃO =============
        const methods = {
            // 1. Video tag simples
            video: (url) => {
                return `<video controls autoplay playsinline src="${url}" style="width:100%;max-height:60vh;aspect-ratio:16/9;object-fit:contain;background:#000;"></video>`;
            },
            // 2. Iframe simples
            iframe: (url) => {
                return `<iframe src="${url}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="width:100%;max-height:60vh;aspect-ratio:16/9;border:none;"></iframe>`;
            },
            // 3. srcdoc (página completa dentro do iframe)
            srcdoc: (url) => {
                const html = `<!DOCTYPE html><html><head><meta name="referrer" content="no-referrer"><style>body{margin:0;background:#000;}video{width:100vw;height:100vh;object-fit:contain;}</style></head><body><video controls autoplay playsinline src="${url}"></video></body></html>`;
                return `<iframe srcdoc="${html.replace(/"/g, '&quot;')}" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="width:100%;max-height:60vh;aspect-ratio:16/9;border:none;"></iframe>`;
            },
            // 4. Blob URL (HTML como blob)
            blob: (url) => {
                const html = `<!DOCTYPE html><html><head><meta name="referrer" content="no-referrer"></head><body style="margin:0;background:#000;"><video controls autoplay playsinline src="${url}" style="width:100vw;height:100vh;object-fit:contain;"></video></body></html>`;
                const blob = new Blob([html], {type: 'text/html'});
                const blobUrl = URL.createObjectURL(blob);
                return {html: `<iframe src="${blobUrl}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="width:100%;max-height:60vh;aspect-ratio:16/9;border:none;"></iframe>`, blobUrl};
            },
            // 5. Embed tag
            embed: (url) => {
                return `<embed src="${url}" type="video/mp4" style="width:100%;max-height:60vh;aspect-ratio:16/9;background:#000;"></embed>`;
            },
            // 6. Object tag
            object: (url) => {
                return `<object data="${url}" type="application/x-mpegURL" style="width:100%;max-height:60vh;aspect-ratio:16/9;background:#000;"></object>`;
            },
            // 7. Sandbox iframe
            sandbox: (url) => {
                return `<iframe src="${url}" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="width:100%;max-height:60vh;aspect-ratio:16/9;border:none;"></iframe>`;
            },
            // 8. No-Referrer iframe
            noreferrer: (url) => {
                const html = `<!DOCTYPE html><html><head><meta name="referrer" content="no-referrer"></head><body style="margin:0;background:#000;"><video controls autoplay playsinline src="${url}" style="width:100vw;height:100vh;"></video></body></html>`;
                return `<iframe srcdoc="${html.replace(/"/g, '&quot;')}" referrerpolicy="no-referrer" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="width:100%;max-height:60vh;aspect-ratio:16/9;border:none;"></iframe>`;
            }
        };

        function testMethod(method) {
            if (!currentVideoUrl) {
                alert('Nenhuma URL para testar');
                return;
            }
            
            const container = document.getElementById('videoContainer');
            const methodName = method;
            
            if (currentPlayer && typeof currentPlayer.dispose === 'function') {
                currentPlayer.dispose();
            }
            
            if (method === 'redirect') {
                window.location.href = currentVideoUrl;
                return;
            }
            
            if (method === 'newtab') {
                window.open(currentVideoUrl, '_blank');
                setStatus('🔗 Aberto em nova aba');
                return;
            }
            
            if (method === 'hlsjs') {
                container.innerHTML = '<video id="hlsVideo" controls autoplay playsinline style="width:100%;max-height:60vh;aspect-ratio:16/9;object-fit:contain;background:#000;"></video>';
                const video = document.getElementById('hlsVideo');
                if (Hls.isSupported()) {
                    const hls = new Hls({ debug: false });
                    hls.loadSource(currentVideoUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>{}));
                    hls.on(Hls.Events.ERROR, (e,d) => setStatus(`❌ Hls.js: ${d.details}`));
                    setStatus(`🎬 Hls.js: ${currentVideoTitle}`);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = currentVideoUrl;
                    video.play().catch(e=>{});
                    setStatus(`🍎 HLS Nativo: ${currentVideoTitle}`);
                }
                document.getElementById('modal').classList.add('active');
                return;
            }
            
            if (method === 'videojs') {
                container.innerHTML = `<video id="vjsVideo" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" style="width:100%;max-height:60vh;aspect-ratio:16/9;"></video>`;
                const player = videojs('vjsVideo', { fluid: true, autoplay: true });
                player.src({ src: currentVideoUrl, type: 'application/x-mpegURL' });
                player.on('error', () => setStatus('❌ Video.js erro'));
                player.on('play', () => setStatus(`▶️ Video.js: ${currentVideoTitle}`));
                currentPlayer = player;
                document.getElementById('modal').classList.add('active');
                return;
            }
            
            const result = methods[method](currentVideoUrl);
            if (typeof result === 'object') {
                container.innerHTML = result.html;
                setTimeout(() => URL.revokeObjectURL(result.blobUrl), 60000);
            } else {
                container.innerHTML = result;
            }
            
            document.getElementById('modal').classList.add('active');
            setStatus(`🎬 Método ${method}: ${currentVideoTitle}`);
            
            setTimeout(() => {
                const video = container.querySelector('video');
                if (video) video.play().catch(e => {});
            }, 100);
        }

        // ============= INICIALIZAÇÃO =============
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentMode = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = currentMode === 'filmes' ? 'flex' : 'none';
                    document.getElementById('grid').classList.toggle('tv-mode', currentMode === 'tv');
                    resetAndLoad();
                });
            });

            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) {
                    currentCategory = btn.dataset.cat;
                    document.querySelectorAll('.categoria').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    resetAndLoad();
                }
            });

            const searchInput = document.getElementById('busca');
            searchInput.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = e.target.value.trim();
                    if (term) performSearch(term);
                    else if (currentMode === 'filmes') resetAndLoad();
                }, 500);
            });

            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                    if (!isLoading && hasMore && currentMode === 'filmes' && !searchInput.value) {
                        loadMore();
                    }
                }
            });

            document.getElementById('modalClose').addEventListener('click', () => {
                document.getElementById('modal').classList.remove('active');
                document.getElementById('videoContainer').innerHTML = '';
                if (currentPlayer) { currentPlayer.dispose(); currentPlayer = null; }
            });
            
            document.getElementById('modal').addEventListener('click', e => {
                if (e.target.classList.contains('modal')) {
                    document.getElementById('modal').classList.remove('active');
                    document.getElementById('videoContainer').innerHTML = '';
                    if (currentPlayer) { currentPlayer.dispose(); currentPlayer = null; }
                }
            });

            document.getElementById('modalCopyBtn').addEventListener('click', () => {
                if (currentVideoUrl) {
                    navigator.clipboard?.writeText(currentVideoUrl).then(() => setStatus('📋 URL copiada!')).catch(() => prompt('Copie:', currentVideoUrl));
                }
            });

            document.getElementById('modalNewTabBtn').addEventListener('click', () => {
                if (currentVideoUrl) { window.open(currentVideoUrl, '_blank'); setStatus('🔗 Nova aba'); }
            });
            
            document.getElementById('clearMethodsBtn').addEventListener('click', () => {
                document.getElementById('methodsStatus').textContent = '';
            });

            document.querySelectorAll('[data-method]').forEach(btn => {
                btn.addEventListener('click', () => testMethod(btn.dataset.method));
            });

            document.getElementById('grid').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (card) openContent(card.dataset.id, card.dataset.title);
            });

            loadCategories();
            loadContent();
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const data = await res.json();
                if (data.categorias && data.categorias.length) {
                    const container = document.getElementById('categorias');
                    const allBtn = container.querySelector('[data-cat="0"]');
                    container.innerHTML = '';
                    container.appendChild(allBtn.cloneNode(true));
                    data.categorias.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {}
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true;
            offset = 0;
            hasMore = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('grid').innerHTML = '';
            try {
                let url = currentMode === 'filmes' ? `${API_BASE}/filmes?limit=50&offset=0&category=${currentCategory}` : `${API_BASE}/canais`;
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || data.canais || [];
                renderItems(items, true);
                offset = items.length;
                hasMore = currentMode === 'filmes' && items.length === 50;
                setStatus(`${items.length} itens`);
            } catch (e) {} finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            try {
                const url = `${API_BASE}/filmes?limit=50&offset=${offset}&category=${currentCategory}`;
                const res = await fetch(url);
                const data = await res.json();
                renderItems(data.filmes || [], false);
                offset += data.filmes?.length || 0;
                hasMore = (data.filmes?.length || 0) === 50;
            } catch (e) {} finally { isLoading = false; }
        }

        async function performSearch(term) {
            document.getElementById('grid').innerHTML = '';
            try {
                const res = await fetch(`${API_BASE}/buscar?q=${encodeURIComponent(term)}`);
                const data = await res.json();
                renderItems(data.filmes || [], true);
            } catch (e) {}
        }

        function renderItems(items, clear) {
            const grid = document.getElementById('grid');
            if (clear) grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.dataset.title = item.titulo || item.title;
                let thumbUrl = item.thumb || (currentMode === 'tv' ? (item.logo || item.cover || '') : '');
                card.innerHTML = `<div class="thumb">${thumbUrl ? `<img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}<div class="fallback" style="display: ${thumbUrl ? 'none' : 'flex'}; width:100%; height:100%; align-items:center; justify-content:center;"><i class="fas fa-${currentMode === 'tv' ? 'tv' : 'film'}"></i></div></div><div class="info"><div class="titulo">${item.titulo || item.title || 'Sem título'}</div><div class="meta">${currentMode === 'tv' ? '<i class="fas fa-circle" style="color:#39FF14; font-size:8px;"></i> AO VIVO' : ''}${item.ano ? `<span><i class="far fa-calendar-alt"></i> ${item.ano}</span>` : ''}</div></div>`;
                grid.appendChild(card);
            });
        }

        async function openContent(id, title) {
            try {
                const endpoint = currentMode === 'filmes' ? `filme/${id}` : `canal/${id}`;
                const res = await fetch(`${API_BASE}/${endpoint}`);
                const data = await res.json();
                const item = data.filme || data.canal;
                
                if (item && item.videoUrl) {
                    currentVideoUrl = item.videoUrl;
                    currentVideoTitle = item.titulo || title;
                    
                    document.getElementById('methodsUrl').textContent = currentVideoUrl;
                    document.getElementById('methodsGrid').style.display = 'grid';
                    document.getElementById('modalTitulo').textContent = currentVideoTitle;
                    
                    // Tenta método 3 (srcdoc) primeiro
                    testMethod('srcdoc');
                }
            } catch (e) {}
        }

        function resetAndLoad() {
            offset = 0;
            hasMore = true;
            document.getElementById('grid').innerHTML = '';
            document.getElementById('busca').value = '';
            loadContent();
        }
    </script>
</body>
</html>
