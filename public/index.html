<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO TV - DEBUG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #0F1C2E; color: #FFFFFF; min-height: 100vh; padding-bottom: 200px; }
        .header { background: #1A2D42; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #E50914; display: flex; align-items: center; gap: 6px; }
        .nav { display: flex; gap: 8px; margin-left: auto; }
        .nav button { background: none; border: none; color: #B0BEC5; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .nav button i { font-size: 16px; }
        .nav button.active { background: #E50914; color: #FFFFFF; }
        .search { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; }
        .search i { color: #B0BEC5; font-size: 14px; }
        .search input { background: none; border: none; color: #FFFFFF; outline: none; font-size: 14px; width: 180px; }
        .categorias { padding: 12px 16px; display: flex; gap: 10px; overflow-x: auto; }
        .categoria { background: #1A2D42; border: none; color: #B0BEC5; padding: 8px 18px; border-radius: 24px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .categoria.active { background: #E50914; color: #FFFFFF; }
        .grid { padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .grid.tv-mode { grid-template-columns: 1fr; }
        .grid.tv-mode .card { display: flex; height: 80px; }
        .grid.tv-mode .card .thumb { width: 120px; height: 80px; }
        .card { background: #1A2D42; border-radius: 14px; overflow: hidden; cursor: pointer; }
        .card .thumb { aspect-ratio: 2/3; background: #0a1520; display: flex; align-items: center; justify-content: center; }
        .card .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card .info { padding: 12px; }
        .card .titulo { font-size: 14px; font-weight: 600; }
        .loading { text-align: center; padding: 30px; color: #B0BEC5; }
        
        /* DEBUG PANEL - FIXO NO RODAPÉ */
        .debug-panel {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 3px solid #E50914;
            max-height: 180px;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            z-index: 200;
        }
        .debug-url {
            background: #1a1a1a;
            padding: 8px;
            border-radius: 4px;
            word-break: break-all;
            color: #64B5F6;
            margin-bottom: 5px;
        }
        .debug-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .debug-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }
        .debug-btn.video { background: #E50914; }
        .debug-btn.iframe { background: #64B5F6; }
        .debug-btn.newtab { background: #2ecc71; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .modal.active { display: block; }
        .modal-header { padding: 12px 16px; background: #1A2D42; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: #FFFFFF; font-size: 24px; cursor: pointer; }
        .video-container { width: 100%; height: calc(100% - 50px); background: #000; }
        .video-container video { width: 100%; height: 100%; object-fit: contain; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A2D42; padding: 8px 16px; font-size: 12px; color: #B0BEC5; display: flex; justify-content: space-between; z-index: 99; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> DSO TV DEBUG</div>
        <div class="nav">
            <button class="active" data-mode="filmes"><i class="fas fa-film"></i> Filmes</button>
            <button data-mode="tv"><i class="fas fa-tv"></i> TV</button>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar filmes...">
        </div>
    </div>
    
    <div class="categorias" id="categorias">
        <button class="categoria active" data-cat="0"><i class="fas fa-star"></i> Todos</button>
    </div>
    
    <div class="grid" id="grid"></div>
    <div class="loading" id="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div>
    
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 id="modalTitulo">Título</h3>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="video-container" id="videoContainer"></div>
    </div>
    
    <!-- PAINEL DE DEBUG -->
    <div class="debug-panel" id="debugPanel">
        <div style="color:#888; margin-bottom:5px;">🔍 ÚLTIMA URL OBTIDA:</div>
        <div class="debug-url" id="debugUrl">Nenhuma URL ainda</div>
        <div class="debug-buttons" id="debugButtons" style="display:none;">
            <button class="debug-btn video" onclick="testVideo()">Testar &lt;video&gt;</button>
            <button class="debug-btn iframe" onclick="testIframe()">Testar &lt;iframe&gt;</button>
            <button class="debug-btn newtab" onclick="testNewTab()">Abrir Nova Aba</button>
            <button class="debug-btn" onclick="copyDebugUrl()">📋 Copiar URL</button>
        </div>
        <div style="color:#888; margin-top:8px; font-size:10px;" id="debugInfo"></div>
    </div>
    
    <div class="status-bar">
        <span id="statusMsg">Pronto</span>
        <span><i class="fas fa-bug"></i> DEBUG MODE</span>
    </div>

    <script>
        const API_BASE = '/api';
        let currentMode = 'filmes';
        let currentCategory = '0';
        let offset = 0;
        let isLoading = false;
        let hasMore = true;
        let searchTimeout = null;
        let lastVideoUrl = '';
        let lastTitle = '';
        let lastMode = '';

        function setStatus(text) {
            document.getElementById('statusMsg').textContent = text;
        }
        
        function showDebug(url, title, mode) {
            lastVideoUrl = url;
            lastTitle = title;
            lastMode = mode;
            
            document.getElementById('debugUrl').textContent = url;
            document.getElementById('debugButtons').style.display = 'flex';
            document.getElementById('debugInfo').innerHTML = `
                Título: ${title}<br>
                Modo: ${mode}<br>
                Tamanho: ${url.length} caracteres
            `;
        }
        
        function testVideo() {
            if (!lastVideoUrl) return;
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.style.width = '100%';
            video.style.height = '100%';
            video.src = lastVideoUrl;
            
            video.onerror = (e) => {
                setStatus('❌ Erro no <video>');
                alert('Erro ao reproduzir com <video>');
            };
            
            video.onplay = () => setStatus('▶️ Reproduzindo com <video>');
            
            container.appendChild(video);
            document.getElementById('modalTitulo').textContent = lastTitle + ' [VIDEO]';
            document.getElementById('modal').classList.add('active');
            
            video.play().catch(e => console.log('Autoplay:', e));
        }
        
        function testIframe() {
            if (!lastVideoUrl) return;
            
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.src = lastVideoUrl;
            iframe.allow = 'autoplay; encrypted-media; fullscreen';
            iframe.allowfullscreen = true;
            
            container.appendChild(iframe);
            document.getElementById('modalTitulo').textContent = lastTitle + ' [IFRAME]';
            document.getElementById('modal').classList.add('active');
            
            setStatus('📺 Abrindo em iframe');
        }
        
        function testNewTab() {
            if (!lastVideoUrl) return;
            window.open(lastVideoUrl, '_blank');
            setStatus('🔗 Aberto em nova aba');
        }
        
        function copyDebugUrl() {
            navigator.clipboard?.writeText(lastVideoUrl).then(() => {
                setStatus('📋 URL copiada!');
            });
        }

        // ============= O RESTO DO CÓDIGO É IGUAL AO ANTERIOR =============
        
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentMode = btn.dataset.mode;
                    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('categorias').style.display = currentMode === 'filmes' ? 'flex' : 'none';
                    document.getElementById('grid').classList.toggle('tv-mode', currentMode === 'tv');
                    resetAndLoad();
                });
            });

            document.getElementById('categorias').addEventListener('click', e => {
                const btn = e.target.closest('.categoria');
                if (btn) {
                    currentCategory = btn.dataset.cat;
                    document.querySelectorAll('.categoria').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    resetAndLoad();
                }
            });

            const searchInput = document.getElementById('busca');
            searchInput.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = e.target.value.trim();
                    if (term) performSearch(term);
                    else if (currentMode === 'filmes') resetAndLoad();
                }, 500);
            });

            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                    if (!isLoading && hasMore && currentMode === 'filmes' && !searchInput.value) {
                        loadMore();
                    }
                }
            });

            document.getElementById('modalClose').addEventListener('click', () => {
                document.getElementById('modal').classList.remove('active');
                document.getElementById('videoContainer').innerHTML = '';
            });
            
            document.getElementById('modal').addEventListener('click', e => {
                if (e.target.classList.contains('modal')) {
                    document.getElementById('modal').classList.remove('active');
                    document.getElementById('videoContainer').innerHTML = '';
                }
            });

            document.getElementById('grid').addEventListener('click', e => {
                const card = e.target.closest('.card');
                if (card) openContent(card.dataset.id, card.dataset.title);
            });

            loadCategories();
            loadContent();
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const data = await res.json();
                if (data.categorias && data.categorias.length) {
                    const container = document.getElementById('categorias');
                    const allBtn = container.querySelector('[data-cat="0"]');
                    container.innerHTML = '';
                    container.appendChild(allBtn.cloneNode(true));
                    data.categorias.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'categoria';
                        btn.dataset.cat = cat.id;
                        btn.innerHTML = `<i class="fas fa-folder"></i> ${cat.nome}`;
                        container.appendChild(btn);
                    });
                }
            } catch (e) {}
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true;
            offset = 0;
            hasMore = true;
            document.getElementById('loading').style.display = 'block';
            setStatus('Carregando...');
            document.getElementById('grid').innerHTML = '';

            try {
                let url = currentMode === 'filmes' 
                    ? `${API_BASE}/filmes?limit=50&offset=0&category=${currentCategory}`
                    : `${API_BASE}/canais`;
                
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || data.canais || [];
                renderItems(items, true);
                offset = items.length;
                hasMore = currentMode === 'filmes' && items.length === 50;
                setStatus(`${items.length} itens`);
            } catch (e) {
                setStatus('Erro ao carregar');
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            try {
                const url = `${API_BASE}/filmes?limit=50&offset=${offset}&category=${currentCategory}`;
                const res = await fetch(url);
                const data = await res.json();
                const items = data.filmes || [];
                renderItems(items, false);
                offset += items.length;
                hasMore = items.length === 50;
            } catch (e) {} finally {
                isLoading = false;
            }
        }

        async function performSearch(term) {
            document.getElementById('grid').innerHTML = '';
            setStatus(`Buscando: ${term}`);
            try {
                const res = await fetch(`${API_BASE}/buscar?q=${encodeURIComponent(term)}`);
                const data = await res.json();
                renderItems(data.filmes || [], true);
                setStatus(`${data.filmes?.length || 0} resultados`);
            } catch (e) {
                setStatus('Erro na busca');
            }
        }

        function renderItems(items, clear) {
            const grid = document.getElementById('grid');
            if (clear) grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;
                card.dataset.title = item.titulo || item.title;
                
                let thumbUrl = item.thumb || '';
                if (!thumbUrl && currentMode === 'tv') {
                    thumbUrl = item.logo || item.cover || '';
                }
                
                card.innerHTML = `
                    <div class="thumb">
                        ${thumbUrl ? `<img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
                        <div class="fallback" style="display: ${thumbUrl ? 'none' : 'flex'}; width:100%; height:100%; align-items:center; justify-content:center;">
                            <i class="fas fa-${currentMode === 'tv' ? 'tv' : 'film'}"></i>
                        </div>
                    </div>
                    <div class="info">
                        <div class="titulo">${item.titulo || item.title || 'Sem título'}</div>
                        <div class="meta">
                            ${currentMode === 'tv' ? '<i class="fas fa-circle" style="color:#39FF14; font-size:8px;"></i> AO VIVO' : ''}
                            ${item.ano ? `<span><i class="far fa-calendar-alt"></i> ${item.ano}</span>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function openContent(id, title) {
            setStatus(`Abrindo ${title}`);
            try {
                const endpoint = currentMode === 'filmes' ? `filme/${id}` : `canal/${id}`;
                const res = await fetch(`${API_BASE}/${endpoint}`);
                const data = await res.json();
                const item = data.filme || data.canal;
                
                if (item && item.videoUrl) {
                    // MOSTRAR NO DEBUG
                    showDebug(item.videoUrl, item.titulo || title, currentMode);
                    
                    // Abrir modal
                    document.getElementById('modalTitulo').textContent = item.titulo || title;
                    
                    // Tenta reproduzir com <video> primeiro
                    const container = document.getElementById('videoContainer');
                    container.innerHTML = '';
                    
                    const video = document.createElement('video');
                    video.controls = true;
                    video.autoplay = true;
                    video.playsInline = true;
                    video.style.width = '100%';
                    video.style.height = '100%';
                    video.src = item.videoUrl;
                    
                    video.onerror = () => {
                        setStatus('❌ Erro no player nativo. Use os botões de debug!');
                        // Não fecha, deixa o usuário testar outras formas
                    };
                    
                    video.onplay = () => setStatus(`▶️ Reproduzindo: ${item.titulo || title}`);
                    
                    container.appendChild(video);
                    document.getElementById('modal').classList.add('active');
                    
                    video.play().catch(e => console.log('Autoplay:', e));
                    
                } else {
                    setStatus('Vídeo não disponível');
                    alert('Conteúdo indisponível no momento.');
                }
            } catch (e) {
                console.error('Erro:', e);
                setStatus('Erro ao abrir');
                alert('Falha ao carregar o conteúdo.');
            }
        }

        function resetAndLoad() {
            offset = 0;
            hasMore = true;
            document.getElementById('grid').innerHTML = '';
            document.getElementById('busca').value = '';
            loadContent();
        }
    </script>
</body>
</html>
